function Toast({message,type,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t)},[onClose]);

  return <div style={{position:"fixed",top:20,right:20,zIndex:9999,padding:"11px 20px",background:bg,color:"#fff",borderRadius:10,fontSize:13,fontWeight:500,boxShadow:C.shadowMd,animation:"toastIn .3s ease"}}>{message}</div>;
}

// ─── CSV ───
function parseCSV(text){
  const lines=text.split("\n").map(l=>l.trim()).filter(Boolean);
  if(lines.length<2)return[];
  const hdr=lines[0].split(",").map(h=>h.replace(/^"|"$/g,"").trim().toLowerCase());
  return lines.slice(1).map(line=>{
    const v=[];let cur="",q=false;
    for(let i=0;i<line.length;i++){if(line[i]==='"')q=!q;else if(line[i]===','&&!q){v.push(cur.trim());cur=""}else cur+=line[i]}
    v.push(cur.trim());
    const o={};hdr.forEach((h,i)=>{o[h]=(v[i]||"").replace(/^"|"$/g,"")});return o;
  });
}
function csvToRes(rows,email,cats){
  return rows.filter(r=>r.name).map(r=>{
    let type="link";const cat=(r.category||"").trim();const rt=(r.type||"").trim().toLowerCase();
    if(cat.toLowerCase()==="passwords"||rt==="password"||rt==="pwd")type="password";
    else if(rt==="file"||rt==="document"||rt==="pdf")type="file";
    else if(rt==="link"||rt==="url")type="link";
    else{const val=(r.value||r.url||"").trim();if(val.startsWith("http"))type="link";else if(val.match(/\.(pdf|doc|docx|xls|xlsx|ppt|pptx|csv|zip)$/i))type="file";else if(cat.toLowerCase().includes("password"))type="password"}
    return{id:r.id||gid(),category:cats.includes(cat)?cat:"Quick Links",name:r.name,type,value:r.value||r.url||r.password||"",description:r.description||"",addedBy:email,addedAt:new Date().toISOString()};
  });
}
function csvToUsers(rows){
  return rows.filter(r=>r.email&&r.name).map(r=>({id:gid(),email:r.email.trim().toLowerCase(),name:r.name.trim(),role:["Admin","Sales Rep","Viewer"].includes(r.role)?r.role:"Viewer",sso:true}));
}

// ─── Login Screen (SSO Only) ───

function App(){
  const [user,setUser]=useState(null);
  const [users,setUsers]=useState(()=>ld(SK.users,DEF_USERS));
  const [res,setRes]=useState(()=>ld(SK.resources,[]));
  const [logs,setLogs]=useState(()=>ld(SK.logs,[]));
  const [cats,setCats]=useState(()=>ld(SK.categories,DEF_CATS));
  const [toast,setToast]=useState(null);
  const [tab,setTab]=useState("home");
  const [search,setSearch]=useState("");
  const [filterCat,setFilterCat]=useState("All");
  const [showAddRes,setShowAddRes]=useState(false);
  const [showEditRes,setShowEditRes]=useState(null);
  const [showDel,setShowDel]=useState(null);
  const [showAddUser,setShowAddUser]=useState(false);
  const [showFlush,setShowFlush]=useState(false);
  const [logFilter,setLogFilter]=useState("All");
  const [clipCount,setClipCount]=useState(0);
  const [newCat,setNewCat]=useState("");
  const clipRef=useRef(null);const impRef=useRef(null);const userImpRef=useRef(null);

  const isAdmin=user?.role==="Admin";

  const persist=(k,d,fn)=>{fn(d);sv(k,d)};
  const addLog=(action,detail,curLogs,curUser)=>{const e={id:gid(),user:curUser?.email||"system",userName:curUser?.name||"System",action,detail,timestamp:new Date().toISOString()};const upd=[e,...curLogs].slice(0,500);setLogs(upd);sv(SK.logs,upd);return upd};

  const handleSSOLogin=(googleUser)=>{
    if(!googleUser.email.endsWith("@itgeeks.com")){setToast({message:"Access restricted to @itgeeks.com domain only",type:"error"});return}
    let eu=users.find(u=>u.email.toLowerCase()===googleUser.email.toLowerCase());
    if(eu){setUser(eu);addLog("SSO Login",`${eu.name} signed in via Google (${eu.role})`,logs,eu)}
    else{const nu={id:gid(),email:googleUser.email.toLowerCase(),name:googleUser.name||googleUser.email.split("@")[0],role:"Viewer",sso:true,picture:googleUser.picture||null};const uu=[...users,nu];persist(SK.users,uu,setUsers);setUser(nu);addLog("SSO Login (New)",`${nu.name} auto-registered as Viewer`,logs,nu);setToast({message:`Welcome ${nu.name}! Registered as Viewer.`,type:"success"})}
  };
  const handleLogout=()=>{addLog("Logout",`${user.name} signed out`,logs,user);setUser(null);setTab("home")};

  const copyPwd=(r)=>{
    try{navigator.clipboard.writeText(r.value)}catch{const t=document.createElement("textarea");t.value=r.value;t.style.cssText="position:fixed;opacity:0";document.body.appendChild(t);t.select();document.execCommand("copy");document.body.removeChild(t)}
    if(clipRef.current)clearInterval(clipRef.current);setClipCount(10);
    clipRef.current=setInterval(()=>{setClipCount(p=>{if(p<=1){clearInterval(clipRef.current);clipRef.current=null;try{navigator.clipboard.writeText("")}catch{}return 0}return p-1})},1000);
    setToast({message:"Password copied — auto-clears in 10s",type:"success"});addLog("Copy Password",`Copied: ${r.name}`,logs,user);
  };
  const accessRes=(r)=>{if(r.type==="password")copyPwd(r);else{addLog(r.type==="link"?"Access Link":"Download File",`${r.type==="link"?"Opened":"Downloaded"}: ${r.name}`,logs,user);window.open(r.value,"_blank")}};

  const addResource=(d)=>{persist(SK.resources,[...res,{...d,id:gid(),addedBy:user.email,addedAt:new Date().toISOString()}],setRes);addLog("Add Resource",`Added "${d.name}"`,logs,user);setShowAddRes(false);setToast({message:"Resource added",type:"success"})};
  const editResource=(d)=>{persist(SK.resources,res.map(r=>r.id===d.id?{...r,...d}:r),setRes);addLog("Edit Resource",`Edited "${d.name}"`,logs,user);setShowEditRes(null);setToast({message:"Updated",type:"success"})};
  const deleteResource=(id)=>{const it=res.find(r=>r.id===id);persist(SK.resources,res.filter(r=>r.id!==id),setRes);addLog("Delete",`Deleted "${it?.name}"`,logs,user);setShowDel(null);setToast({message:"Deleted",type:"success"})};

  const addUser=(d)=>{
    if(!d.email.endsWith("@itgeeks.com")){setToast({message:"Only @itgeeks.com",type:"error"});return}
    if(users.find(u=>u.email.toLowerCase()===d.email.toLowerCase())){setToast({message:"Email exists",type:"error"});return}
    persist(SK.users,[...users,{...d,id:gid()}],setUsers);addLog("Add User",`Added ${d.name}`,logs,user);setShowAddUser(false);setToast({message:"User added",type:"success"});
  };
  const deleteUser=(id)=>{
    if(users.find(u=>u.id===id)?.email===user.email){setToast({message:"Cannot remove yourself",type:"error"});return}
    const usr=users.find(u=>u.id===id);persist(SK.users,users.filter(u=>u.id!==id),setUsers);addLog("Remove User",`Removed ${usr?.name}`,logs,user);setToast({message:"Removed",type:"success"});
  };

  const handleUserImport=(e)=>{
    const file=e.target.files[0];if(!file)return;const reader=new FileReader();
    reader.onload=(ev)=>{try{const rows=parseCSV(ev.target.result);const nu=csvToUsers(rows);const existing=new Set(users.map(u=>u.email.toLowerCase()));const valid=nu.filter(u=>u.email.endsWith("@itgeeks.com")&&!existing.has(u.email));const dupes=nu.length-valid.length;if(valid.length){persist(SK.users,[...users,...valid],setUsers);addLog("Bulk Import",`${valid.length} users`,logs,user)}setToast({message:`${valid.length} added${dupes?`, ${dupes} skipped`:""}`,type:valid.length?"success":"error"})}catch{setToast({message:"Parse error",type:"error"})}};reader.readAsText(file);
    if(userImpRef.current)userImpRef.current.value="";
  };

  const expJSON=()=>{const b=new Blob([JSON.stringify({resources:res,categories:cats,exportDate:new Date().toISOString()},null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=`itgeeks_${new Date().toISOString().slice(0,10)}.json`;a.click();addLog("Export","JSON",logs,user);setToast({message:"Exported",type:"success"})};
  const expCSV=()=>{const h=["category","name","type","value","description"];const rows=res.map(r=>h.map(k=>`"${String(r[k]||"").replace(/"/g,'""')}"`).join(","));const b=new Blob([h.join(",")+"\n"+rows.join("\n")],{type:"text/csv"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=`itgeeks_${new Date().toISOString().slice(0,10)}.csv`;a.click();addLog("Export","CSV",logs,user);setToast({message:"CSV exported",type:"success"})};
  const handleImport=(e)=>{
    const file=e.target.files[0];if(!file)return;const ext=file.name.split(".").pop().toLowerCase();const reader=new FileReader();
    if(ext==="json"){reader.onload=(ev)=>{try{const d=JSON.parse(ev.target.result);if(d.resources){const ids=new Set(res.map(r=>r.id));const nw=d.resources.filter(r=>!ids.has(r.id));persist(SK.resources,[...res,...nw],setRes);if(d.categories){const merged=[...new Set([...cats,...d.categories])].sort();persist(SK.categories,merged,setCats)}addLog("Import",`${nw.length} from JSON`,logs,user);setToast({message:`${nw.length} imported`,type:"success"})}}catch{setToast({message:"Parse error",type:"error"})}};reader.readAsText(file)}
    else if(ext==="csv"){reader.onload=(ev)=>{try{const nw=csvToRes(parseCSV(ev.target.result),user.email,cats);if(!nw.length){setToast({message:"No valid rows",type:"error"});return}persist(SK.resources,[...res,...nw],setRes);addLog("Import",`${nw.length} from CSV`,logs,user);setToast({message:`${nw.length} imported`,type:"success"})}catch{setToast({message:"Parse error",type:"error"})}};reader.readAsText(file)}
    else setToast({message:"Use JSON or CSV",type:"error"});
    if(impRef.current)impRef.current.value="";
  };

  const flushAll=()=>{persist(SK.resources,[],setRes);persist(SK.logs,[],setLogs);persist(SK.users,DEF_USERS,setUsers);persist(SK.categories,DEF_CATS,setCats);setShowFlush(false);setToast({message:"All data flushed",type:"success"})};
  const addCategory=()=>{const n=newCat.trim();if(!n)return;if(cats.includes(n)){setToast({message:"Already exists",type:"error"});return}const upd=[...cats,n].sort();persist(SK.categories,upd,setCats);setNewCat("");addLog("Add Category",`Added "${n}"`,logs,user);setToast({message:`"${n}" added`,type:"success"})};
  const removeCategory=(c)=>{persist(SK.categories,cats.filter(x=>x!==c),setCats);addLog("Remove Category",`Removed "${c}"`,logs,user);setToast({message:`Removed "${c}"`,type:"success"})};

  const filtered=res.filter(r=>{const cm=filterCat==="All"||r.category===filterCat;const sm=!search||r.name.toLowerCase().includes(search.toLowerCase())||r.description?.toLowerCase().includes(search.toLowerCase());return cm&&sm});
  const grouped=filtered.reduce((a,r)=>{(a[r.category]=a[r.category]||[]).push(r);return a},{});
  const logActions=[...new Set(logs.map(l=>l.action))];
  const fLogs=logFilter==="All"?logs:logs.filter(l=>l.action===logFilter);

  if(!user)return <><LoginScreen onSSOLogin={handleSSOLogin} setToast={setToast}/>{toast&&<Toast {...toast} onClose={()=>setToast(null)}/>}</>;

  const nav=[{id:"home",label:"Home",ic:icons.home},{id:"resources",label:"Category",ic:icons.category},...(isAdmin?[{id:"users",label:"Users",ic:icons.users},{id:"logs",label:"Activity",ic:icons.activity},{id:"ie",label:"Download",ic:icons.download},{id:"settings",label:"Settings",ic:icons.settings}]:[])];
  const stats=[{l:"Total",v:res.length,c:C.blue},{l:"Passwords",v:res.filter(r=>r.type==="password").length,c:C.danger},{l:"Links",v:res.filter(r=>r.type==="link").length,c:C.success},{l:"Files",v:res.filter(r=>r.type==="file").length,c:C.warning}];

  return <>
  <div style={{display:"flex",minHeight:"100vh",background:C.bg,color:C.text}}>
    {/* SIDEBAR */}
    <aside style={{width:88,background:C.sidebar,borderRight:`1px solid ${C.border}`,display:"flex",flexDirection:"column",alignItems:"center",paddingTop:20,flexShrink:0}}>
      <div style={{width:40,height:40,background:C.accent,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:700,color:"#fff",marginBottom:28}}>iG</div>
      <nav style={{flex:1,display:"flex",flexDirection:"column",gap:4,width:"100%"}}>
        {nav.map(n=><div key={n.id} className="nv" onClick={()=>setTab(n.id)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"10px 4px",cursor:"pointer",borderRadius:8,margin:"0 8px",color:tab===n.id?C.accent:C.textMuted,background:tab===n.id?C.accentLight:"transparent",transition:"all .12s"}}><Ic d={n.ic}/><span style={{fontSize:10,fontWeight:500}}>{n.label}</span></div>)}
      </nav>
      <div style={{paddingBottom:16}}><div className="nv" onClick={handleLogout} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"10px 4px",cursor:"pointer",borderRadius:8,margin:"0 8px",color:C.danger}}><Ic d={icons.logout}/><span style={{fontSize:10,fontWeight:500}}>Logout</span></div></div>
    </aside>

    <main style={{flex:1,overflow:"auto",padding:"24px 32px"}}>
      {/* Clipboard banner */}
      {clipCount>0&&<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 16px",marginBottom:16,background:C.warningBg,border:`1px solid ${C.warning}40`,borderRadius:10}}>
        <div style={{display:"flex",alignItems:"center",gap:8,fontSize:13,color:C.warning,fontWeight:500}}><Ic d={icons.lock} size={14} sw={2}/><span>Password in clipboard — auto-clears in <strong>{clipCount}s</strong></span></div>
        <button onClick={()=>{if(clipRef.current)clearInterval(clipRef.current);try{navigator.clipboard.writeText("")}catch{}setClipCount(0);setToast({message:"Cleared",type:"success"})}} style={{background:C.warning,color:"#fff",border:"none",borderRadius:6,padding:"4px 12px",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>Clear Now</button>
      </div>}

      {/* User badge */}
      <div style={{display:"flex",justifyContent:"flex-end",marginBottom:16}}>
        <div style={{display:"flex",alignItems:"center",gap:10,padding:"8px 14px",background:C.surface,borderRadius:10,border:`1px solid ${C.borderLight}`}}>
          <div style={{width:30,height:30,borderRadius:8,background:C.accentLight,color:C.accent,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700}}>{user.name.charAt(0)}</div>
          <div><div style={{fontSize:12,fontWeight:600}}>{user.name}</div><div style={{fontSize:10,color:C.textMuted}}>{user.email}</div></div>
          <RoleBadge role={user.role}/>
        </div>
      </div>

      {/* HOME */}
      {tab==="home"&&<div style={{animation:"fadeUp .25s ease"}}>
        <h2 style={{fontSize:22,fontWeight:700,margin:"0 0 4px"}}>Welcome, {user.name.split(" ")[0]}</h2>
        <p style={{color:C.textMuted,fontSize:13,margin:"0 0 22px"}}>Your resource hub overview</p>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(170px, 1fr))",gap:14,marginBottom:26}}>
          {stats.map(s=><div key={s.l} style={{padding:"18px 20px",background:C.surface,border:`1px solid ${C.borderLight}`,borderRadius:12,boxShadow:C.shadow}}><div style={{fontSize:11,color:C.textMuted,fontWeight:600,textTransform:"uppercase",letterSpacing:".04em",marginBottom:6}}>{s.l}</div><div style={{fontSize:28,fontWeight:700,color:s.c}}>{s.v}</div></div>)}
        </div>
        <div style={{background:C.surface,border:`1px solid ${C.borderLight}`,borderRadius:12,boxShadow:C.shadow,padding:"18px 20px"}}>
          <h3 style={{fontSize:14,fontWeight:600,margin:"0 0 14px"}}>Recent Resources</h3>
          {res.length===0?<p style={{color:C.textMuted,fontSize:13}}>No resources yet.</p>:
          res.slice(-5).reverse().map(r=><div key={r.id} className="rh" onClick={()=>accessRes(r)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 12px",borderRadius:8,cursor:"pointer",marginBottom:2,transition:"all .12s"}}><div style={{display:"flex",alignItems:"center",gap:12}}><TypeIcon type={r.type}/><div><div style={{fontSize:13,fontWeight:500}}>{r.name}</div><div style={{fontSize:11,color:C.textMuted}}>{r.category}</div></div></div><span style={{fontSize:11,color:C.textMuted}}>{r.type==="password"?"Copy":r.type==="file"?"Download":"Open"}</span></div>)}
        </div>
      </div>}

      {/* RESOURCES */}
      {tab==="resources"&&<div style={{animation:"fadeUp .25s ease"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4,flexWrap:"wrap",gap:10}}>
          <div><h2 style={{fontSize:22,fontWeight:700,margin:0}}>All Resources</h2><p style={{color:C.textMuted,fontSize:13,margin:"3px 0 0"}}>{filtered.length} items</p></div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <div style={{position:"relative"}}><span style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)",color:C.textMuted,display:"flex"}}><Ic d={icons.search} size={16} sw={2}/></span><input placeholder="Search..." value={search} onChange={e=>setSearch(e.target.value)} style={{...iS,paddingLeft:34,width:200,background:C.surface}}/></div>
            {isAdmin&&<Btn icon={<Ic d={icons.plus} size={15} sw={2.2}/>} onClick={()=>setShowAddRes(true)}>Add Resource</Btn>}
          </div>
        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:8,margin:"16px 0 24px"}}>
          {["All",...cats].map(c=><button key={c} onClick={()=>setFilterCat(c)} style={{padding:"7px 18px",borderRadius:22,fontSize:13,fontWeight:500,cursor:"pointer",fontFamily:"inherit",transition:"all .15s",border:filterCat===c?"none":`1px solid ${C.border}`,background:filterCat===c?C.accent:C.surface,color:filterCat===c?"#fff":C.textSec}}>{c}</button>)}
        </div>
        {Object.keys(grouped).length===0?<div style={{textAlign:"center",padding:50,color:C.textMuted}}>No resources found</div>:
        Object.entries(grouped).map(([cat,items])=><div key={cat} style={{marginBottom:22}}>
          <h3 style={{fontSize:12,fontWeight:700,color:C.textMuted,textTransform:"uppercase",letterSpacing:".06em",marginBottom:8}}>{cat}</h3>
          <div style={{background:C.surface,border:`1px solid ${C.borderLight}`,borderRadius:12,boxShadow:C.shadow,overflow:"hidden"}}>
            {items.map((r,i)=><div key={r.id} className="rh" style={{display:"flex",alignItems:"center",padding:"13px 18px",borderBottom:i<items.length-1?`1px solid ${C.borderLight}`:"none",gap:14}}>
              <TypeIcon type={r.type}/>
              <div style={{flex:1,minWidth:0}}><div style={{fontSize:14,fontWeight:600,marginBottom:1}}>{r.name}</div><div style={{fontSize:12,color:C.textMuted,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.description||"—"}</div>{r.type==="password"&&<div style={{fontSize:13,color:C.textMuted,marginTop:2,letterSpacing:3,userSelect:"none"}}>●●●●●●●●●●</div>}</div>
              <div style={{display:"flex",gap:6,alignItems:"center",flexShrink:0}}>
                {r.type==="password"&&<Btn variant="ghost" size="sm" icon={<Ic d={icons.copy} size={14} sw={2}/>} onClick={()=>copyPwd(r)}>Copy</Btn>}
                {r.type!=="password"&&<Btn variant="ghost" size="sm" icon={<Ic d={icons.extLink} size={14} sw={2}/>} onClick={()=>accessRes(r)}>Open</Btn>}
                {r.type!=="password"&&<Btn variant="ghost" size="sm" icon={<Ic d={icons.dl} size={14} sw={2}/>} onClick={()=>accessRes(r)}>Download</Btn>}
                {isAdmin&&<><Btn variant="ghost" size="sm" icon={<Ic d={icons.edit} size={14} sw={2}/>} onClick={()=>setShowEditRes(r)} style={{color:C.textMuted}}/><Btn variant="ghost" size="sm" icon={<Ic d={icons.trash} size={14} sw={2}/>} onClick={()=>setShowDel(r.id)} style={{color:C.danger}}/></>}
              </div>
            </div>)}
          </div>
        </div>)}
      </div>}

      {/* USERS */}
      {tab==="users"&&isAdmin&&<div style={{animation:"fadeUp .25s ease"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18,flexWrap:"wrap",gap:10}}>
          <h2 style={{fontSize:22,fontWeight:700,margin:0}}>User Management</h2>
          <div style={{display:"flex",gap:8}}>
            <input ref={userImpRef} type="file" accept=".csv" onChange={handleUserImport} style={{display:"none"}}/>
            <Btn variant="secondary" icon={<Ic d={icons.ul} size={14} sw={2}/>} onClick={()=>userImpRef.current?.click()}>Bulk Upload CSV</Btn>
            <Btn icon={<Ic d={icons.plus} size={15} sw={2.2}/>} onClick={()=>setShowAddUser(true)}>Add User</Btn>
          </div>
        </div>
        <div style={{background:C.surface,border:`1px solid ${C.borderLight}`,borderRadius:12,boxShadow:C.shadow,overflow:"hidden"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
            <thead><tr style={{borderBottom:`2px solid ${C.borderLight}`}}>{["Name","Email","Role","Actions"].map(h=><th key={h} style={{textAlign:"left",padding:"12px 18px",fontSize:11,fontWeight:700,color:C.textMuted,textTransform:"uppercase",letterSpacing:".05em"}}>{h}</th>)}</tr></thead>
            <tbody>{users.map(u=><tr key={u.id} className="rh" style={{borderBottom:`1px solid ${C.borderLight}`}}>
              <td style={{padding:"12px 18px",fontWeight:500}}>{u.name}</td>
              <td style={{padding:"12px 18px",color:C.textSec}}>{u.email}</td>
              <td style={{padding:"12px 18px"}}><RoleBadge role={u.role}/></td>
              <td style={{padding:"12px 18px"}}>{u.email!==user.email?<Btn variant="ghost" size="sm" onClick={()=>deleteUser(u.id)} style={{color:C.danger}}>Remove</Btn>:<span style={{fontSize:11,color:C.textMuted}}>You</span>}</td>
            </tr>)}</tbody>
          </table>
        </div>
        <div style={{marginTop:16,padding:16,background:C.surface,border:`1px solid ${C.borderLight}`,borderRadius:12,boxShadow:C.shadow}}>
          <h3 style={{fontSize:14,fontWeight:600,margin:"0 0 8px"}}>Bulk Upload Format</h3>
          <p style={{fontSize:12,color:C.textMuted,lineHeight:1.5}}>CSV headers: <code style={{background:C.surfaceWarm,padding:"2px 6px",borderRadius:4,fontSize:12}}>name, email, role</code>. Role must be <strong>Admin</strong>, <strong>Sales Rep</strong>, or <strong>Viewer</strong>. Duplicates auto-skipped.</p>
        </div>
      </div>}

      {/* LOGS */}
      {tab==="logs"&&isAdmin&&<div style={{animation:"fadeUp .25s ease"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18,flexWrap:"wrap",gap:10}}>
          <div><h2 style={{fontSize:22,fontWeight:700,margin:0}}>Activity Logs</h2><p style={{color:C.textMuted,fontSize:13,margin:"3px 0 0"}}>{fLogs.length} entries</p></div>
          <div style={{display:"flex",gap:8}}>
            <select value={logFilter} onChange={e=>setLogFilter(e.target.value)} style={{...iS,width:"auto",background:C.surface}}><option value="All">All</option>{logActions.map(a=><option key={a} value={a}>{a}</option>)}</select>
            <Btn variant="ghost" size="sm" onClick={()=>{setLogs([]);sv(SK.logs,[]);setToast({message:"Cleared",type:"success"})}}>Clear</Btn>
          </div>
        </div>
        <div style={{background:C.surface,border:`1px solid ${C.borderLight}`,borderRadius:12,boxShadow:C.shadow,overflow:"hidden"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:13,tableLayout:"fixed"}}>
            <colgroup><col style={{width:"20%"}}/><col style={{width:"22%"}}/><col style={{width:"16%"}}/><col style={{width:"42%"}}/></colgroup>
            <thead><tr style={{borderBottom:`2px solid ${C.borderLight}`}}>{["Timestamp","User","Action","Detail"].map(h=><th key={h} style={{textAlign:"left",padding:"12px 18px",fontSize:11,fontWeight:700,color:C.textMuted,textTransform:"uppercase",letterSpacing:".05em"}}>{h}</th>)}</tr></thead>
            <tbody>
              {fLogs.length===0?<tr><td colSpan={4} style={{padding:36,textAlign:"center",color:C.textMuted}}>No logs</td></tr>:
              fLogs.slice(0,100).map(l=>{const ac=l.action.includes("Delete")||l.action.includes("Remove")?C.danger:l.action.includes("Login")||l.action.includes("Logout")?C.warning:l.action.includes("Copy")?C.purple:C.blue;
                return <tr key={l.id} className="rh" style={{borderBottom:`1px solid ${C.borderLight}`}}>
                  <td style={{padding:"11px 18px",color:C.textMuted,fontSize:12}}>{fdt(l.timestamp)}</td>
                  <td style={{padding:"11px 18px",color:C.textSec,fontSize:12,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{l.user}</td>
                  <td style={{padding:"11px 18px"}}><span style={{padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:600,background:`${ac}14`,color:ac}}>{l.action}</span></td>
                  <td style={{padding:"11px 18px",color:C.textSec,fontSize:12,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{l.detail}</td>
                </tr>})}
            </tbody>
          </table>
        </div>
      </div>}

      {/* IMPORT/EXPORT */}
      {tab==="ie"&&isAdmin&&<div style={{animation:"fadeUp .25s ease"}}>
        <h2 style={{fontSize:22,fontWeight:700,margin:"0 0 4px"}}>Import & Export</h2>
        <p style={{color:C.textMuted,fontSize:13,margin:"0 0 22px"}}>Backup or restore your data</p>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(260px, 1fr))",gap:14,marginBottom:24}}>
          {[{title:"Export JSON",desc:"Full backup. Re-importable.",color:C.blue,bg:C.blueLight,action:expJSON,label:"Download JSON",variant:"blue"},{title:"Export CSV",desc:"For Google Sheets.",color:C.success,bg:C.successBg,action:expCSV,label:"Download CSV",variant:"success"},{title:"Import Data",desc:"Upload JSON or CSV.",color:C.warning,bg:C.warningBg,action:()=>impRef.current?.click(),label:"Upload File",variant:"secondary"}].map(item=>
            <div key={item.title} style={{padding:22,background:C.surface,border:`1px solid ${C.borderLight}`,borderRadius:12,boxShadow:C.shadow}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}><div style={{width:36,height:36,borderRadius:10,background:item.bg,color:item.color,display:"flex",alignItems:"center",justifyContent:"center"}}><Ic d={icons.download}/></div><h3 style={{fontSize:14,fontWeight:600,margin:0}}>{item.title}</h3></div>
              <p style={{fontSize:12,color:C.textMuted,lineHeight:1.5,marginBottom:14}}>{item.desc}</p>
              <Btn variant={item.variant} onClick={item.action} icon={<Ic d={icons.dl} size={14} sw={2}/>}>{item.label}</Btn>
            </div>)}
        </div>
        <input ref={impRef} type="file" accept=".json,.csv" onChange={handleImport} style={{display:"none"}}/>
        <div style={{padding:22,background:C.surface,border:`1px solid ${C.danger}30`,borderRadius:12,boxShadow:C.shadow}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}><div style={{width:36,height:36,borderRadius:10,background:C.dangerBg,color:C.danger,display:"flex",alignItems:"center",justifyContent:"center"}}><Ic d={icons.trash} size={14} sw={2}/></div><div><h3 style={{fontSize:14,fontWeight:600,margin:0,color:C.danger}}>Flush All Data</h3><span style={{fontSize:11,color:C.textMuted}}>Danger Zone</span></div></div>
          <p style={{fontSize:12,color:C.textSec,lineHeight:1.5,marginBottom:14}}>Permanently delete all resources, logs, and reset users.</p>
          <Btn variant="danger" onClick={()=>setShowFlush(true)} icon={<Ic d={icons.trash} size={14} sw={2}/>}>Flush All Data</Btn>
        </div>
      </div>}

      {/* SETTINGS */}
      {tab==="settings"&&isAdmin&&<div style={{animation:"fadeUp .25s ease"}}>
        <h2 style={{fontSize:22,fontWeight:700,margin:"0 0 4px"}}>Settings</h2>
        <p style={{color:C.textMuted,fontSize:13,margin:"0 0 22px"}}>Manage categories and configuration</p>
        <div style={{background:C.surface,border:`1px solid ${C.borderLight}`,borderRadius:12,boxShadow:C.shadow,padding:22,marginBottom:20}}>
          <h3 style={{fontSize:15,fontWeight:600,margin:"0 0 14px"}}>Category Management</h3>
          <p style={{fontSize:12,color:C.textMuted,lineHeight:1.5,marginBottom:16}}>Add or remove categories. Changes apply immediately.</p>
          <div style={{display:"flex",gap:8,marginBottom:20}}><input value={newCat} onChange={e=>setNewCat(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addCategory()} placeholder="New category name..." style={{...iS,flex:1}}/><Btn onClick={addCategory} icon={<Ic d={icons.plus} size={15} sw={2.2}/>} disabled={!newCat.trim()}>Add</Btn></div>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {cats.map(c=>{const count=res.filter(r=>r.category===c).length;return <div key={c} style={{display:"flex",alignItems:"center",gap:6,padding:"7px 14px",background:C.surfaceWarm,borderRadius:20,border:`1px solid ${C.border}`,fontSize:13,fontWeight:500,color:C.text}}><Ic d={icons.tag} size={14} sw={2}/>{c}<span style={{fontSize:11,color:C.textMuted}}>({count})</span>{count===0&&<button onClick={()=>removeCategory(c)} style={{background:"none",border:"none",color:C.danger,cursor:"pointer",padding:0,display:"flex"}}><Ic d={icons.x} size={14} sw={2}/></button>}</div>})}
          </div>
          <p style={{fontSize:11,color:C.textMuted,marginTop:12}}>Categories with resources cannot be removed.</p>
        </div>
        <div style={{background:C.surface,border:`1px solid ${C.borderLight}`,borderRadius:12,boxShadow:C.shadow,padding:22,marginBottom:20}}>
          <h3 style={{fontSize:15,fontWeight:600,margin:"0 0 12px"}}>Google SSO Configuration</h3>
          <div style={{padding:16,background:C.surfaceWarm,borderRadius:10,border:`1px solid ${C.borderLight}`,fontSize:12,color:C.textSec,lineHeight:1.8}}>
            <strong style={{color:C.text}}>Step 1:</strong> Go to <span style={{color:C.blue,fontWeight:500}}>console.cloud.google.com</span><br/>
            <strong style={{color:C.text}}>Step 2:</strong> APIs & Services → Credentials → Create OAuth 2.0 Client ID<br/>
            <strong style={{color:C.text}}>Step 3:</strong> Application Type: "Web application"<br/>
            <strong style={{color:C.text}}>Step 4:</strong> Authorized JavaScript Origins: add your Vercel domain<br/>
            <strong style={{color:C.text}}>Step 5:</strong> Replace <code style={{background:C.bg,padding:"2px 6px",borderRadius:4,fontSize:11}}>YOUR_CLIENT_ID</code> at the top of index.html<br/>
            <strong style={{color:C.text}}>Step 6:</strong> Restrict OAuth app to @itgeeks.com in Google Workspace Admin
          </div>
          <div style={{marginTop:12,padding:"8px 14px",background:GOOGLE_CLIENT_ID==="YOUR_CLIENT_ID.apps.googleusercontent.com"?C.warningBg:C.successBg,borderRadius:8,fontSize:12,fontWeight:500,color:GOOGLE_CLIENT_ID==="YOUR_CLIENT_ID.apps.googleusercontent.com"?C.warning:C.success}}>
            Status: {GOOGLE_CLIENT_ID==="YOUR_CLIENT_ID.apps.googleusercontent.com"?"Demo Mode — SSO simulated":"SSO Active"}
          </div>
        </div>
        <div style={{background:C.surface,border:`1px solid ${C.borderLight}`,borderRadius:12,boxShadow:C.shadow,padding:22}}>
          <h3 style={{fontSize:15,fontWeight:600,margin:"0 0 8px"}}>Database</h3>
          <p style={{fontSize:12,color:C.textMuted,lineHeight:1.6}}>Data is stored in browser localStorage. Export CSV → upload to Google Sheets for backup. Import CSV back when Sheets data changes.</p>
        </div>
      </div>}

    </main>
  </div>

  {/* MODALS */}
  {showAddRes&&<ResModal title="Add Resource" cats={cats} onClose={()=>setShowAddRes(false)} onSave={addResource}/>}
  {showEditRes&&<ResModal title="Edit Resource" cats={cats} resource={showEditRes} onClose={()=>setShowEditRes(null)} onSave={editResource}/>}
  {showDel&&<Modal title="Delete Resource" onClose={()=>setShowDel(null)} width={400}><p style={{fontSize:13,color:C.textSec,marginBottom:18}}>Are you sure? Cannot be undone.</p><div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><Btn variant="secondary" onClick={()=>setShowDel(null)}>Cancel</Btn><Btn variant="danger" onClick={()=>deleteResource(showDel)}>Delete</Btn></div></Modal>}
  {showFlush&&<Modal title="Flush All Data" onClose={()=>setShowFlush(false)} width={440}><div style={{padding:"14px 16px",background:C.dangerBg,borderRadius:8,border:`1px solid ${C.danger}30`,marginBottom:18}}><p style={{margin:0,fontSize:13,color:C.danger,fontWeight:500}}>This will permanently delete:</p><ul style={{margin:"8px 0 0 18px",fontSize:13,color:C.textSec,lineHeight:1.8}}><li>All resources</li><li>All activity logs</li><li>All custom users (reset to defaults)</li></ul></div><div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><Btn variant="secondary" onClick={()=>setShowFlush(false)}>Cancel</Btn><Btn variant="danger" onClick={flushAll} icon={<Ic d={icons.trash} size={14} sw={2}/>}>Flush Everything</Btn></div></Modal>}
  {showAddUser&&<UserModal onClose={()=>setShowAddUser(false)} onSave={addUser}/>}
  {toast&&<Toast {...toast} onClose={()=>setToast(null)}/>}
  </>;
}

function ResModal({title,resource,cats,onClose,onSave}){
  const [name,setName]=useState(resource?.name||"");const [cat,setCat]=useState(resource?.category||cats[0]||"");const [type,setType]=useState(resource?.type||"link");const [val,setVal]=useState(resource?.value||"");const [desc,setDesc]=useState(resource?.description||"");
  return <Modal title={title} onClose={onClose}>
    <FF label="Resource Name"><input value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. CRM Login" style={iS}/></FF>
    <FF label="Category"><select value={cat} onChange={e=>setCat(e.target.value)} style={{...iS,cursor:"pointer"}}>{cats.map(c=><option key={c} value={c}>{c}</option>)}</select></FF>
    <FF label="Type"><select value={type} onChange={e=>setType(e.target.value)} style={{...iS,cursor:"pointer"}}><option value="link">Link / URL</option><option value="password">Password</option><option value="file">File</option></select></FF>
    <FF label={type==="password"?"Password":type==="link"?"URL":"File Name"}><input value={val} onChange={e=>setVal(e.target.value)} placeholder={type==="password"?"Enter password":type==="link"?"https://...":"filename.pdf"} style={iS}/></FF>
    <FF label="Description"><input value={desc} onChange={e=>setDesc(e.target.value)} placeholder="Brief description" style={iS}/></FF>
    <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:4}}><Btn variant="secondary" onClick={onClose}>Cancel</Btn><Btn onClick={()=>{if(!name.trim()||!val.trim())return;onSave({...(resource||{}),name:name.trim(),category:cat,type,value:val.trim(),description:desc.trim()})}} disabled={!name.trim()||!val.trim()}>Save</Btn></div>
  </Modal>;
}

function UserModal({onClose,onSave}){
  const [name,setName]=useState("");const [email,setEmail]=useState("");const [role,setRole]=useState("Viewer");
  return <Modal title="Add User" onClose={onClose}>
    <FF label="Full Name"><input value={name} onChange={e=>setName(e.target.value)} placeholder="John Doe" style={iS}/></FF>
    <FF label="Email"><input value={email} onChange={e=>setEmail(e.target.value)} placeholder="user@itgeeks.com" style={iS}/></FF>
    <FF label="Role"><select value={role} onChange={e=>setRole(e.target.value)} style={{...iS,cursor:"pointer"}}><option value="Admin">Admin</option><option value="Sales Rep">Sales Rep</option><option value="Viewer">Viewer</option></select></FF>
    <p style={{fontSize:11,color:C.textMuted,marginBottom:12}}>No password needed — user signs in via Google SSO.</p>
    <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:4}}><Btn variant="secondary" onClick={onClose}>Cancel</Btn><Btn onClick={()=>{if(!name.trim()||!email.trim())return;onSave({name:name.trim(),email:email.trim().toLowerCase(),role,sso:true})}} disabled={!name.trim()||!email.trim()}>Add User</Btn></div>
  </Modal>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
