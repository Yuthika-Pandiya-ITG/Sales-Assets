// ══════ COMPONENTS ══════
function Toast({message,type,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t)},[onClose]);
  const bg=type==="success"?C.green:type==="error"?C.red:C.blue;
  return <div style={{position:"fixed",top:20,right:20,zIndex:9999,padding:"11px 20px",background:bg,color:"#fff",borderRadius:4,fontSize:13,fontWeight:500,fontFamily:"'DM Mono',monospace",boxShadow:C.shadowMd,animation:"toastIn .3s ease",letterSpacing:".02em"}}>{message}</div>;
}
function Modal({title,onClose,children,width=520}){
  return <div style={{position:"fixed",inset:0,zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(58,50,38,0.25)",backdropFilter:"blur(2px)"}} onClick={onClose}>
    <div className="card" style={{width:"92%",maxWidth:width,maxHeight:"85vh",overflow:"auto",padding:"24px 28px"}} onClick={e=>e.stopPropagation()}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h3 style={{margin:0,fontSize:16,fontWeight:600,color:C.text,fontFamily:"'Libre Baskerville',serif"}}>{title}</h3>
        <button onClick={onClose} style={{background:"none",border:"none",color:C.textMuted,cursor:"pointer",padding:2,display:"flex"}}><Ic d={ic.x} size={18} sw={2}/></button>
      </div>{children}
    </div>
  </div>;
}
function FF({label,ch}){return <div style={{marginBottom:16}}><label style={{display:"block",fontSize:11,fontWeight:500,color:C.textSec,marginBottom:6,fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:".08em"}}>{label}</label>{ch}</div>}
const iS={width:"100%",padding:"10px 14px",background:"#faf6ef",border:`1px solid ${C.border}`,borderRadius:4,color:C.text,fontSize:13,outline:"none",boxSizing:"border-box",fontFamily:"inherit"};
function Btn({children,variant="primary",size="md",icon,disabled,style:cs,...p}){
  const sz={sm:{padding:"4px 10px",fontSize:12},md:{padding:"8px 16px",fontSize:13},lg:{padding:"10px 22px",fontSize:14}}[size];
  const vr={primary:{background:C.accent,color:"#fff",border:"none"},blue:{background:C.blue,color:"#fff",border:"none"},secondary:{background:C.surfaceWarm,color:C.text,border:`1px solid ${C.border}`},danger:{background:C.red,color:"#fff",border:"none"},ghost:{background:"transparent",color:C.textSec,border:`1px solid ${C.border}`},success:{background:C.green,color:"#fff",border:"none"}}[variant];
  return <button disabled={disabled} {...p} style={{...sz,...vr,borderRadius:4,cursor:disabled?"not-allowed":"pointer",fontWeight:500,display:"inline-flex",alignItems:"center",gap:5,fontFamily:"'DM Mono',monospace",fontSize:sz.fontSize,transition:"all .15s",opacity:disabled?.4:1,...(cs||{})}}>{icon&&<span style={{display:"flex"}}>{icon}</span>}{children}</button>;
}
function RoleBadge({role}){
  const m={Admin:{bg:C.accentLight,c:C.accentDark},"Sales Rep":{bg:C.greenBg,c:C.green},Viewer:{bg:C.amberBg,c:C.amber}};const c=m[role]||m.Viewer;
  return <span style={{padding:"2px 10px",borderRadius:2,fontSize:11,fontWeight:500,background:c.bg,color:c.c,fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:".05em"}}>{role}</span>;
}
function TypeIcon({type}){
  const m={password:{i:ic.lock,bg:C.redBg,c:C.red},link:{i:ic.ext,bg:C.blueBg,c:C.blue},file:{i:ic.file,bg:C.amberBg,c:C.amber}};const c=m[type]||m.link;

}

// ══════ CSV ══════
function parseCSV(t){const ls=t.split("\n").map(l=>l.trim()).filter(Boolean);if(ls.length<2)return[];const h=ls[0].split(",").map(x=>x.replace(/^"|"$/g,"").trim().toLowerCase());return ls.slice(1).map(l=>{const v=[];let c="",q=false;for(let i=0;i<l.length;i++){if(l[i]==='"')q=!q;else if(l[i]===','&&!q){v.push(c.trim());c=""}else c+=l[i]}v.push(c.trim());const o={};h.forEach((x,i)=>{o[x]=(v[i]||"").replace(/^"|"$/g,"")});return o})}
function csvToRes(rows,email,cats){return rows.filter(r=>r.name).map(r=>{let type="link";const cat=(r.category||"").trim();const rt=(r.type||"").trim().toLowerCase();if(cat.toLowerCase()==="passwords"||rt==="password"||rt==="pwd")type="password";else if(rt==="file"||rt==="document"||rt==="pdf")type="file";else if(rt==="link"||rt==="url")type="link";else{const v=(r.value||r.url||"").trim();if(v.startsWith("http"))type="link";else if(v.match(/\.(pdf|doc|docx|xls|xlsx|ppt|pptx|csv|zip)$/i))type="file";else if(cat.toLowerCase().includes("password"))type="password"}return{id:r.id||gid(),category:cats.includes(cat)?cat:"Quick Links",name:r.name,type,value:r.value||r.url||r.password||"",description:r.description||"",addedBy:email,addedAt:new Date().toISOString()}})}
function csvToUsers(rows){return rows.filter(r=>r.email&&r.name).map(r=>({id:gid(),email:r.email.trim().toLowerCase(),name:r.name.trim(),role:["Admin","Sales Rep","Viewer"].includes(r.role)?r.role:"Viewer",sso:true}))}

// ══════ GOOGLE ICON ══════
function GoogleIcon(){return <svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>}

// ══════ LOGIN ══════
function LoginScreen({onSSOLogin,setToast}){
  const gBtnRef=useRef(null);
  useEffect(()=>{
    if(IS_DEMO)return;
    const s=document.createElement("script");s.src="https://accounts.google.com/gsi/client";s.async=true;
    s.onload=()=>{if(window.google&&gBtnRef.current){window.google.accounts.id.initialize({client_id:GOOGLE_CLIENT_ID,callback:(r)=>{try{const p=JSON.parse(atob(r.credential.split(".")[1]));onSSOLogin({email:p.email,name:p.name||p.email.split("@")[0],picture:p.picture||null,hd:p.hd||null})}catch{setToast({message:"Authentication failed",type:"error"})}},auto_select:false,hosted_domain:"itgeeks.com"});window.google.accounts.id.renderButton(gBtnRef.current,{theme:"outline",size:"large",width:320,text:"signin_with",shape:"rectangular"})}};
    document.head.appendChild(s);return()=>{try{document.head.removeChild(s)}catch{}}
  },[]);

  return <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",backgroundImage:"url(\"data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='200' height='200' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E\")"}}>
    <div style={{width:480,position:"relative"}}>

      <div style={{position:"absolute",top:-8,left:20,right:20,height:40,background:"#d4cbb8",borderRadius:"6px 6px 0 0",transform:"translateY(-100%)"}}/>
      <div style={{position:"absolute",top:-4,left:10,right:10,height:40,background:"#dfd7c6",borderRadius:"6px 6px 0 0",transform:"translateY(-100%)"}}/>
      {/* Main folder card */}
      <div className="card" style={{padding:"40px 44px",position:"relative"}}>
        {/* Confidential stamp */}
        <div style={{position:"absolute",top:20,right:24}}><span className="stamp">Confidential</span></div>
        {/* Paperclip decoration */}
        <div style={{position:"absolute",top:-12,left:60,color:C.textMuted,opacity:.4,transform:"rotate(15deg)"}}><Ic d={ic.clip} size={32} sw={1.2}/></div>

        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{display:"inline-block",padding:"6px 16px",border:`1.5px solid ${C.border}`,borderRadius:30,marginBottom:16}}>
            <span style={{fontFamily:"'Libre Baskerville',serif",fontSize:14,fontWeight:700,color:C.text}}>I.G</span>
          </div>
          <div style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:C.textMuted,textTransform:"uppercase",letterSpacing:".1em",marginBottom:4}}>ITGeeks Resource Hub</div>
          <div style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:C.textMuted,letterSpacing:".05em"}}>.SECURE ACCESS PORTAL.</div>
        </div>

        <h1 style={{fontFamily:"'Libre Baskerville',serif",fontSize:28,fontWeight:700,color:C.text,marginBottom:8,textAlign:"center"}}>"RESOURCE HUB"</h1>
        <p style={{textAlign:"center",fontSize:13,color:C.textMuted,marginBottom:32,fontFamily:"'DM Mono',monospace"}}>Sign in with your @itgeeks.com account</p>

        {/* Google SSO */}
        {!IS_DEMO?<div ref={gBtnRef} style={{display:"flex",justifyContent:"center",marginBottom:20}}/>:
        <div>
          <button onClick={()=>onSSOLogin({email:"admin@itgeeks.com",name:"Admin",picture:null,hd:"itgeeks.com"})} style={{width:"100%",padding:"14px 20px",background:"#faf6ef",border:`1.5px solid ${C.border}`,borderRadius:4,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:12,fontSize:14,fontWeight:500,color:C.text,fontFamily:"inherit",boxShadow:C.shadow}}><GoogleIcon/> Sign in with Google</button>

function App(){

  const [showEditRes,setShowEditRes]=useState(null);
  const [showDel,setShowDel]=useState(null);

  const clipRef=useRef(null);const impRef=useRef(null);const userImpRef=useRef(null);
  const isAdmin=user?.role==="Admin";

  const persist=(k,d,fn)=>{fn(d);sv(k,d)};
  const addLog=(action,detail,cl,cu)=>{const e={id:gid(),user:cu?.email||"system",action,detail,timestamp:new Date().toISOString()};const u=[e,...cl].slice(0,500);setLogs(u);sv(SK.logs,u);return u};

  const handleSSOLogin=(gu)=>{
    if(!gu.email.endsWith("@itgeeks.com")){setToast({message:"@itgeeks.com only",type:"error"});return}
    let eu=users.find(u=>u.email.toLowerCase()===gu.email.toLowerCase());
    if(eu){setUser(eu);addLog("SSO Login",`${eu.name} (${eu.role})`,logs,eu)}
    else{const nu={id:gid(),email:gu.email.toLowerCase(),name:gu.name||gu.email.split("@")[0],role:"Viewer",sso:true};const uu=[...users,nu];persist(SK.users,uu,setUsers);setUser(nu);addLog("SSO Login (New)",`${nu.name} auto-registered`,logs,nu);setToast({message:`Welcome ${nu.name}!`,type:"success"})}
  };
  const handleLogout=()=>{addLog("Logout",`${user.name} signed out`,logs,user);setUser(null);setTab("home")};

  const copyPwd=(r)=>{try{navigator.clipboard.writeText(r.value)}catch{const t=document.createElement("textarea");t.value=r.value;t.style.cssText="position:fixed;opacity:0";document.body.appendChild(t);t.select();document.execCommand("copy");document.body.removeChild(t)}if(clipRef.current)clearInterval(clipRef.current);setClipCount(10);clipRef.current=setInterval(()=>{setClipCount(p=>{if(p<=1){clearInterval(clipRef.current);clipRef.current=null;try{navigator.clipboard.writeText("")}catch{}return 0}return p-1})},1000);setToast({message:"Copied — auto-clears 10s",type:"success"});addLog("Copy Password",`${r.name}`,logs,user)};
  const accessRes=(r)=>{if(r.type==="password")copyPwd(r);else{addLog(r.type==="link"?"Access Link":"Download",`${r.name}`,logs,user);window.open(r.value,"_blank")}};

  const addResource=(d)=>{persist(SK.resources,[...res,{...d,id:gid(),addedBy:user.email,addedAt:new Date().toISOString()}],setRes);addLog("Add",`"${d.name}"`,logs,user);setShowAddRes(false);setToast({message:"Added",type:"success"})};
  const editResource=(d)=>{persist(SK.resources,res.map(r=>r.id===d.id?{...r,...d}:r),setRes);addLog("Edit",`"${d.name}"`,logs,user);setShowEditRes(null);setToast({message:"Updated",type:"success"})};
  const deleteResource=(id)=>{const it=res.find(r=>r.id===id);persist(SK.resources,res.filter(r=>r.id!==id),setRes);addLog("Delete",`"${it?.name}"`,logs,user);setShowDel(null);setToast({message:"Deleted",type:"success"})};
  const addUser=(d)=>{if(!d.email.endsWith("@itgeeks.com")){setToast({message:"@itgeeks.com only",type:"error"});return}if(users.find(u=>u.email.toLowerCase()===d.email.toLowerCase())){setToast({message:"Exists",type:"error"});return}persist(SK.users,[...users,{...d,id:gid()}],setUsers);addLog("Add User",d.name,logs,user);setShowAddUser(false);setToast({message:"Added",type:"success"})};
  const deleteUser=(id)=>{if(users.find(u=>u.id===id)?.email===user.email){setToast({message:"Can't remove yourself",type:"error"});return}const usr=users.find(u=>u.id===id);persist(SK.users,users.filter(u=>u.id!==id),setUsers);addLog("Remove",usr?.name,logs,user);setToast({message:"Removed",type:"success"})};
  const handleUserImport=(e)=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=(ev)=>{try{const rows=parseCSV(ev.target.result);const nu=csvToUsers(rows);const ex=new Set(users.map(u=>u.email.toLowerCase()));const valid=nu.filter(u=>u.email.endsWith("@itgeeks.com")&&!ex.has(u.email));if(valid.length){persist(SK.users,[...users,...valid],setUsers);addLog("Bulk Import",`${valid.length} users`,logs,user)}setToast({message:`${valid.length} added, ${nu.length-valid.length} skipped`,type:valid.length?"success":"error"})}catch{setToast({message:"Parse error",type:"error"})}};r.readAsText(f);if(userImpRef.current)userImpRef.current.value=""};

  const expJSON=()=>{const b=new Blob([JSON.stringify({resources:res,categories:cats,exportDate:new Date().toISOString()},null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=`itgeeks_${new Date().toISOString().slice(0,10)}.json`;a.click();addLog("Export","JSON",logs,user);setToast({message:"Exported",type:"success"})};
  const expCSV=()=>{const h=["category","name","type","value","description"];const rows=res.map(r=>h.map(k=>`"${String(r[k]||"").replace(/"/g,'""')}"`).join(","));const b=new Blob([h.join(",")+"\n"+rows.join("\n")],{type:"text/csv"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=`itgeeks_${new Date().toISOString().slice(0,10)}.csv`;a.click();addLog("Export","CSV",logs,user);setToast({message:"CSV exported",type:"success"})};
  const handleImport=(e)=>{const f=e.target.files[0];if(!f)return;const ext=f.name.split(".").pop().toLowerCase();const r=new FileReader();if(ext==="json"){r.onload=(ev)=>{try{const d=JSON.parse(ev.target.result);if(d.resources){const ids=new Set(res.map(r=>r.id));const nw=d.resources.filter(r=>!ids.has(r.id));persist(SK.resources,[...res,...nw],setRes);if(d.categories){persist(SK.categories,[...new Set([...cats,...d.categories])].sort(),setCats)}addLog("Import",`${nw.length} from JSON`,logs,user);setToast({message:`${nw.length} imported`,type:"success"})}}catch{setToast({message:"Parse error",type:"error"})}};r.readAsText(f)}else if(ext==="csv"){r.onload=(ev)=>{try{const nw=csvToRes(parseCSV(ev.target.result),user.email,cats);if(!nw.length){setToast({message:"No valid rows",type:"error"});return}persist(SK.resources,[...res,...nw],setRes);addLog("Import",`${nw.length} from CSV`,logs,user);setToast({message:`${nw.length} imported`,type:"success"})}catch{setToast({message:"Parse error",type:"error"})}};r.readAsText(f)}else setToast({message:"Use JSON or CSV",type:"error"});if(impRef.current)impRef.current.value=""};
  const flushAll=()=>{persist(SK.resources,[],setRes);persist(SK.logs,[],setLogs);persist(SK.users,DEF_USERS,setUsers);persist(SK.categories,DEF_CATS,setCats);setShowFlush(false);setToast({message:"All data flushed",type:"success"})};
  const addCategory=()=>{const n=newCat.trim();if(!n)return;if(cats.includes(n)){setToast({message:"Exists",type:"error"});return}persist(SK.categories,[...cats,n].sort(),setCats);setNewCat("");addLog("Add Category",`"${n}"`,logs,user);setToast({message:`"${n}" added`,type:"success"})};
  const removeCategory=(c)=>{persist(SK.categories,cats.filter(x=>x!==c),setCats);addLog("Remove Category",c,logs,user);setToast({message:`Removed`,type:"success"})};

  const filtered=res.filter(r=>(filterCat==="All"||r.category===filterCat)&&(!search||r.name.toLowerCase().includes(search.toLowerCase())||r.description?.toLowerCase().includes(search.toLowerCase())));
  const grouped=filtered.reduce((a,r)=>{(a[r.category]=a[r.category]||[]).push(r);return a},{});
  const fLogs=(logFilter==="All"?logs:logs.filter(l=>l.action===logFilter)).slice(0,100);

  if(!user)return <><LoginScreen onSSOLogin={handleSSOLogin} setToast={setToast}/>{toast&&<Toast {...toast} onClose={()=>setToast(null)}/>}</>;

  const nav=[{id:"home",l:"Home",i:ic.home},{id:"resources",l:"Files",i:ic.cat},...(isAdmin?[{id:"users",l:"Users",i:ic.users},{id:"logs",l:"Logs",i:ic.log},{id:"ie",l:"Export",i:ic.dl},{id:"settings",l:"Config",i:ic.gear}]:[])];

  return <>
  <div style={{display:"flex",minHeight:"100vh",background:C.bg,color:C.text,backgroundImage:"url(\"data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='200' height='200' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E\")"}}>
    {/* SIDEBAR */}
    <aside style={{width:78,background:C.sidebar,borderRight:`1px solid ${C.border}`,display:"flex",flexDirection:"column",alignItems:"center",paddingTop:18,flexShrink:0}}>
      <div style={{padding:"5px 12px",border:`1.5px solid ${C.border}`,borderRadius:20,marginBottom:24}}>
        <span style={{fontFamily:"'Libre Baskerville',serif",fontSize:12,fontWeight:700,color:C.text}}>I.G</span>
      </div>
      <nav style={{flex:1,display:"flex",flexDirection:"column",gap:2,width:"100%"}}>
        {nav.map(n=><div key={n.id} className="nv" onClick={()=>setTab(n.id)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"9px 4px",cursor:"pointer",borderRadius:4,margin:"0 6px",color:tab===n.id?C.accentDark:C.textMuted,background:tab===n.id?C.accentLight:"transparent",transition:"all .12s"}}><Ic d={n.i} size={18}/><span style={{fontSize:9,fontWeight:500,fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:".05em"}}>{n.l}</span></div>)}
      </nav>
      <div style={{paddingBottom:14}}><div className="nv" onClick={handleLogout} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"9px 4px",cursor:"pointer",borderRadius:4,margin:"0 6px",color:C.red}}><Ic d={ic.out} size={18}/><span style={{fontSize:9,fontWeight:500,fontFamily:"'DM Mono',monospace"}}>EXIT</span></div></div>
    </aside>

    <main style={{flex:1,overflow:"auto",padding:"20px 28px"}}>
      {clipCount>0&&<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 14px",marginBottom:14,background:C.amberBg,border:`1px solid ${C.amber}40`,borderRadius:4}}>
        <span style={{fontSize:12,color:C.amber,fontWeight:500,fontFamily:"'DM Mono',monospace"}}><Ic d={ic.lock} size={12} sw={2}/> Clipboard auto-clears: {clipCount}s</span>
        <button onClick={()=>{if(clipRef.current)clearInterval(clipRef.current);try{navigator.clipboard.writeText("")}catch{}setClipCount(0)}} style={{background:C.amber,color:"#fff",border:"none",borderRadius:2,padding:"3px 10px",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"'DM Mono',monospace"}}>CLEAR</button>
      </div>}

      {/* User badge + confidential stamp */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
        <span className="stamp">Confidential</span>
        <div style={{display:"flex",alignItems:"center",gap:8,padding:"6px 12px",background:C.surface,borderRadius:4,border:`1px solid ${C.borderLight}`}}>
          <div style={{width:28,height:28,borderRadius:4,background:C.accentLight,color:C.accentDark,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,fontFamily:"'Libre Baskerville',serif"}}>{user.name.charAt(0)}</div>
          <div><div style={{fontSize:12,fontWeight:600}}>{user.name}</div><div style={{fontSize:10,color:C.textMuted,fontFamily:"'DM Mono',monospace"}}>{user.email}</div></div>
          <RoleBadge role={user.role}/>
        </div>
      </div>

      {/* ═══ HOME ═══ */}
      {tab==="home"&&<div style={{animation:"fadeUp .25s ease"}}>
        <h2 style={{fontFamily:"'Libre Baskerville',serif",fontSize:22,fontWeight:700,margin:"0 0 4px"}}>Welcome, {user.name.split(" ")[0]}</h2>
        <p style={{color:C.textMuted,fontSize:12,fontFamily:"'DM Mono',monospace",margin:"0 0 20px"}}>RESOURCE HUB OVERVIEW</p>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(160px, 1fr))",gap:12,marginBottom:24}}>
          {[{l:"Total",v:res.length,c:C.blue},{l:"Passwords",v:res.filter(r=>r.type==="password").length,c:C.red},{l:"Links",v:res.filter(r=>r.type==="link").length,c:C.green},{l:"Files",v:res.filter(r=>r.type==="file").length,c:C.amber}].map(s=><div key={s.l} className="card" style={{padding:"16px 18px"}}><div style={{fontSize:10,color:C.textMuted,fontWeight:500,fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:".08em",marginBottom:6}}>{s.l}</div><div style={{fontSize:28,fontWeight:700,color:s.c,fontFamily:"'Libre Baskerville',serif"}}>{s.v}</div></div>)}
        </div>
        <div className="card" style={{padding:"16px 18px"}}>
          <h3 style={{fontSize:13,fontWeight:600,margin:"0 0 12px",fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:".05em"}}>Recent Files</h3>
          {res.length===0?<p style={{color:C.textMuted,fontSize:13}}>No resources yet.</p>:
          res.slice(-5).reverse().map(r=><div key={r.id} className="rh" onClick={()=>accessRes(r)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"9px 10px",borderRadius:4,cursor:"pointer",marginBottom:2}}><div style={{display:"flex",alignItems:"center",gap:10}}><TypeIcon type={r.type}/><div><div style={{fontSize:13,fontWeight:500}}>{r.name}</div><div style={{fontSize:11,color:C.textMuted,fontFamily:"'DM Mono',monospace"}}>{r.category}</div></div></div><span style={{fontSize:10,color:C.textMuted,fontFamily:"'DM Mono',monospace",textTransform:"uppercase"}}>{r.type==="password"?"COPY":r.type==="file"?"DL":"OPEN"}</span></div>)}
        </div>
      </div>}

      {/* ═══ RESOURCES ═══ */}
      {tab==="resources"&&<div style={{animation:"fadeUp .25s ease"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4,flexWrap:"wrap",gap:10}}>
          <div><h2 style={{fontFamily:"'Libre Baskerville',serif",fontSize:22,fontWeight:700,margin:0}}>All Files</h2><p style={{color:C.textMuted,fontSize:12,fontFamily:"'DM Mono',monospace",margin:"3px 0 0"}}>{filtered.length} ITEMS</p></div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <div style={{position:"relative"}}><span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",color:C.textMuted,display:"flex"}}><Ic d={ic.search} size={14} sw={2}/></span><input placeholder="Search..." value={search} onChange={e=>setSearch(e.target.value)} style={{...iS,paddingLeft:32,width:180}}/></div>
            {isAdmin&&<Btn icon={<Ic d={ic.plus} size={14} sw={2.2}/>} onClick={()=>setShowAddRes(true)}>ADD</Btn>}
          </div>
        </div>
        {/* Folder tabs */}
        <div style={{display:"flex",flexWrap:"wrap",gap:2,margin:"14px 0 0",borderBottom:`1px solid ${C.border}`}}>
          {["All",...cats].map(c=><button key={c} className={`folder-tab${filterCat===c?" active":""}`} onClick={()=>setFilterCat(c)}>{c}</button>)}
        </div>
        <div style={{background:C.surface,borderRadius:"0 0 4px 4px",border:`1px solid ${C.borderLight}`,borderTop:"none",padding:"16px 0",marginBottom:20}}>
          {Object.keys(grouped).length===0?<div style={{textAlign:"center",padding:40,color:C.textMuted,fontFamily:"'DM Mono',monospace"}}>NO FILES FOUND</div>:
          Object.entries(grouped).map(([cat,items])=><div key={cat} style={{marginBottom:16,padding:"0 18px"}}>
            <h3 style={{fontSize:11,fontWeight:500,color:C.textMuted,fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:".08em",marginBottom:8,display:"flex",alignItems:"center",gap:6}}><Ic d={ic.tag} size={12} sw={1.5}/>{cat}</h3>
            {items.map((r,i)=><div key={r.id} className="rh" style={{display:"flex",alignItems:"center",padding:"11px 14px",borderRadius:4,gap:12,borderBottom:i<items.length-1?`1px solid ${C.borderLight}`:"none"}}>
              <TypeIcon type={r.type}/>
              <div style={{flex:1,minWidth:0}}><div style={{fontSize:14,fontWeight:600,marginBottom:1}}>{r.name}</div><div style={{fontSize:12,color:C.textMuted,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.description||"—"}</div>{r.type==="password"&&<div style={{fontSize:13,color:C.textMuted,marginTop:2,letterSpacing:3,userSelect:"none",fontFamily:"'DM Mono',monospace"}}>●●●●●●●●●●</div>}</div>
              <div style={{display:"flex",gap:4,alignItems:"center",flexShrink:0}}>
                {r.type==="password"&&<Btn variant="ghost" size="sm" icon={<Ic d={ic.copy} size={12} sw={2}/>} onClick={()=>copyPwd(r)}>COPY</Btn>}
                {r.type!=="password"&&<Btn variant="ghost" size="sm" icon={<Ic d={ic.ext} size={12} sw={2}/>} onClick={()=>accessRes(r)}>OPEN</Btn>}
                {r.type!=="password"&&<Btn variant="ghost" size="sm" icon={<Ic d={ic.dl} size={12} sw={2}/>} onClick={()=>accessRes(r)}>DL</Btn>}
                {isAdmin&&<><Btn variant="ghost" size="sm" icon={<Ic d={ic.edit} size={12} sw={2}/>} onClick={()=>setShowEditRes(r)} style={{color:C.textMuted}}/><Btn variant="ghost" size="sm" icon={<Ic d={ic.trash} size={12} sw={2}/>} onClick={()=>setShowDel(r.id)} style={{color:C.red}}/></>}
              </div>
            </div>)}
          </div>)}
        </div>
      </div>}

      {/* ═══ USERS ═══ */}
      {tab==="users"&&isAdmin&&<div style={{animation:"fadeUp .25s ease"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18,flexWrap:"wrap",gap:10}}>
          <h2 style={{fontFamily:"'Libre Baskerville',serif",fontSize:22,fontWeight:700,margin:0}}>Personnel</h2>
          <div style={{display:"flex",gap:8}}><input ref={userImpRef} type="file" accept=".csv" onChange={handleUserImport} style={{display:"none"}}/><Btn variant="secondary" icon={<Ic d={ic.ul} size={14} sw={2}/>} onClick={()=>userImpRef.current?.click()}>BULK CSV</Btn><Btn icon={<Ic d={ic.plus} size={14} sw={2.2}/>} onClick={()=>setShowAddUser(true)}>ADD</Btn></div>
        </div>
        <div className="card" style={{overflow:"hidden"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
            <thead><tr style={{borderBottom:`2px solid ${C.border}`}}>{["Name","Email","Role",""].map(h=><th key={h} style={{textAlign:"left",padding:"10px 16px",fontSize:10,fontWeight:500,color:C.textMuted,fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:".08em"}}>{h}</th>)}</tr></thead>
            <tbody>{users.map(u=><tr key={u.id} className="rh" style={{borderBottom:`1px solid ${C.borderLight}`}}>
              <td style={{padding:"10px 16px",fontWeight:500}}>{u.name}</td>
              <td style={{padding:"10px 16px",color:C.textSec,fontFamily:"'DM Mono',monospace",fontSize:12}}>{u.email}</td>
              <td style={{padding:"10px 16px"}}><RoleBadge role={u.role}/></td>
              <td style={{padding:"10px 16px"}}>{u.email!==user.email?<Btn variant="ghost" size="sm" onClick={()=>deleteUser(u.id)} style={{color:C.red}}>REMOVE</Btn>:<span style={{fontSize:10,color:C.textMuted,fontFamily:"'DM Mono',monospace"}}>YOU</span>}</td>
            </tr>)}</tbody>
          </table>
        </div>
        <div className="card" style={{marginTop:14,padding:16}}><p style={{fontSize:12,color:C.textMuted,fontFamily:"'DM Mono',monospace",lineHeight:1.6}}>CSV FORMAT: name, email, role — no password needed (SSO). Duplicates auto-skipped.</p></div>
      </div>}

      {/* ═══ LOGS ═══ */}
      {tab==="logs"&&isAdmin&&<div style={{animation:"fadeUp .25s ease"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18,flexWrap:"wrap",gap:10}}>
          <h2 style={{fontFamily:"'Libre Baskerville',serif",fontSize:22,fontWeight:700,margin:0}}>Activity Log</h2>
          <div style={{display:"flex",gap:8}}>
            <select value={logFilter} onChange={e=>setLogFilter(e.target.value)} style={{...iS,width:"auto"}}><option value="All">All</option>{[...new Set(logs.map(l=>l.action))].map(a=><option key={a} value={a}>{a}</option>)}</select>
            <Btn variant="ghost" size="sm" onClick={()=>{setLogs([]);sv(SK.logs,[])}}>CLEAR</Btn>
          </div>
        </div>
        <div className="card" style={{overflow:"hidden"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,tableLayout:"fixed"}}>
            <colgroup><col style={{width:"22%"}}/><col style={{width:"24%"}}/><col style={{width:"16%"}}/><col style={{width:"38%"}}/></colgroup>
            <thead><tr style={{borderBottom:`2px solid ${C.border}`}}>{["When","Who","Action","Detail"].map(h=><th key={h} style={{textAlign:"left",padding:"10px 16px",fontSize:10,fontWeight:500,color:C.textMuted,fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:".08em"}}>{h}</th>)}</tr></thead>
            <tbody>{fLogs.length===0?<tr><td colSpan={4} style={{padding:30,textAlign:"center",color:C.textMuted,fontFamily:"'DM Mono',monospace"}}>EMPTY</td></tr>:
            fLogs.map(l=>{const ac=l.action.includes("Delete")||l.action.includes("Remove")?C.red:l.action.includes("Login")||l.action.includes("Logout")?C.amber:l.action.includes("Copy")?"#7554b8":C.blue;
              return <tr key={l.id} className="rh" style={{borderBottom:`1px solid ${C.borderLight}`}}>
                <td style={{padding:"9px 16px",color:C.textMuted,fontFamily:"'DM Mono',monospace",fontSize:11}}>{fdt(l.timestamp)}</td>
                <td style={{padding:"9px 16px",color:C.textSec,fontFamily:"'DM Mono',monospace",fontSize:11,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{l.user}</td>
                <td style={{padding:"9px 16px"}}><span style={{padding:"2px 8px",borderRadius:2,fontSize:10,fontWeight:600,background:`${ac}18`,color:ac,fontFamily:"'DM Mono',monospace"}}>{l.action}</span></td>
                <td style={{padding:"9px 16px",color:C.textSec,fontSize:11,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{l.detail}</td>
              </tr>})}</tbody>
          </table>
        </div>
      </div>}

      {/* ═══ IMPORT/EXPORT ═══ */}
      {tab==="ie"&&isAdmin&&<div style={{animation:"fadeUp .25s ease"}}>
        <h2 style={{fontFamily:"'Libre Baskerville',serif",fontSize:22,fontWeight:700,margin:"0 0 4px"}}>Import & Export</h2>
        <p style={{color:C.textMuted,fontSize:12,fontFamily:"'DM Mono',monospace",margin:"0 0 20px"}}>BACKUP / RESTORE</p>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(240px, 1fr))",gap:12,marginBottom:20}}>
          {[{t:"Export JSON",d:"Full backup.",c:C.blue,bg:C.blueBg,fn:expJSON,l:"JSON",v:"blue"},{t:"Export CSV",d:"For Sheets.",c:C.green,bg:C.greenBg,fn:expCSV,l:"CSV",v:"success"},{t:"Import",d:"JSON or CSV.",c:C.amber,bg:C.amberBg,fn:()=>impRef.current?.click(),l:"UPLOAD",v:"secondary"}].map(x=>
            <div key={x.t} className="card" style={{padding:20}}><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}><div style={{width:32,height:32,borderRadius:4,background:x.bg,color:x.c,display:"flex",alignItems:"center",justifyContent:"center"}}><Ic d={ic.dl}/></div><h3 style={{fontSize:13,fontWeight:600,margin:0}}>{x.t}</h3></div><p style={{fontSize:12,color:C.textMuted,marginBottom:12}}>{x.d}</p><Btn variant={x.v} onClick={x.fn} icon={<Ic d={ic.dl} size={14} sw={2}/>}>{x.l}</Btn></div>)}
        </div>
        <input ref={impRef} type="file" accept=".json,.csv" onChange={handleImport} style={{display:"none"}}/>
        <div className="card" style={{padding:20,borderColor:`${C.red}40`}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}><div style={{width:32,height:32,borderRadius:4,background:C.redBg,color:C.red,display:"flex",alignItems:"center",justifyContent:"center"}}><Ic d={ic.trash} size={14} sw={2}/></div><div><h3 style={{fontSize:13,fontWeight:600,margin:0,color:C.red}}>Flush All</h3><span style={{fontSize:10,color:C.textMuted,fontFamily:"'DM Mono',monospace"}}>DANGER ZONE</span></div></div>
          <p style={{fontSize:12,color:C.textSec,marginBottom:12}}>Delete everything. Cannot undo.</p>
          <Btn variant="danger" onClick={()=>setShowFlush(true)} icon={<Ic d={ic.trash} size={14} sw={2}/>}>FLUSH</Btn>
        </div>
      </div>}

      {/* ═══ SETTINGS ═══ */}
      {tab==="settings"&&isAdmin&&<div style={{animation:"fadeUp .25s ease"}}>
        <h2 style={{fontFamily:"'Libre Baskerville',serif",fontSize:22,fontWeight:700,margin:"0 0 4px"}}>Configuration</h2>
        <p style={{color:C.textMuted,fontSize:12,fontFamily:"'DM Mono',monospace",margin:"0 0 20px"}}>SYSTEM SETTINGS</p>
        <div className="card" style={{padding:20,marginBottom:16}}>
          <h3 style={{fontSize:14,fontWeight:600,margin:"0 0 12px"}}>Categories</h3>
          <div style={{display:"flex",gap:8,marginBottom:16}}><input value={newCat} onChange={e=>setNewCat(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addCategory()} placeholder="New category..." style={{...iS,flex:1}}/><Btn onClick={addCategory} icon={<Ic d={ic.plus} size={14} sw={2.2}/>} disabled={!newCat.trim()}>ADD</Btn></div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>{cats.map(c=>{const n=res.filter(r=>r.category===c).length;return <div key={c} style={{display:"flex",alignItems:"center",gap:4,padding:"5px 12px",background:C.surfaceWarm,borderRadius:2,border:`1px solid ${C.border}`,fontSize:12,fontWeight:500}}><Ic d={ic.tag} size={11} sw={1.5}/>{c}<span style={{fontSize:10,color:C.textMuted}}>({n})</span>{n===0&&<button onClick={()=>removeCategory(c)} style={{background:"none",border:"none",color:C.red,cursor:"pointer",padding:0,display:"flex"}}><Ic d={ic.x} size={12} sw={2}/></button>}</div>})}</div>
        </div>
        <div className="card" style={{padding:20,marginBottom:16}}>
          <h3 style={{fontSize:14,fontWeight:600,margin:"0 0 10px"}}>Google SSO</h3>
          <div style={{padding:14,background:C.surfaceWarm,borderRadius:4,border:`1px solid ${C.borderLight}`,fontSize:12,color:C.textSec,lineHeight:1.8,fontFamily:"'DM Mono',monospace"}}>
            1. console.cloud.google.com → Create/select project<br/>2. APIs & Services → Credentials → OAuth 2.0 Client ID<br/>3. Type: Web application<br/>4. Authorized Origins: your Vercel URL<br/>5. Replace YOUR_CLIENT_ID in index.html<br/>6. Restrict to @itgeeks.com in Workspace Admin
          </div>
          <div style={{marginTop:10,padding:"6px 12px",background:IS_DEMO?C.amberBg:C.greenBg,borderRadius:2,fontSize:11,fontWeight:500,color:IS_DEMO?C.amber:C.green,fontFamily:"'DM Mono',monospace",display:"inline-block"}}>{IS_DEMO?"DEMO MODE":"SSO ACTIVE"}</div>
        </div>
        <div className="card" style={{padding:20}}>
          <h3 style={{fontSize:14,fontWeight:600,margin:"0 0 8px"}}>Storage</h3>
          <p style={{fontSize:12,color:C.textMuted,lineHeight:1.6}}>localStorage-based. Export CSV → Google Sheets for backup. Re-import when Sheets data changes.</p>
        </div>
      </div>}
    </main>
  </div>

  {showAddRes&&<ResModal t="Add Resource" cats={cats} onClose={()=>setShowAddRes(false)} onSave={addResource}/>}
  {showEditRes&&<ResModal t="Edit Resource" cats={cats} r={showEditRes} onClose={()=>setShowEditRes(null)} onSave={editResource}/>}
  {showDel&&<Modal title="Delete" onClose={()=>setShowDel(null)} width={400}><p style={{fontSize:13,color:C.textSec,marginBottom:18}}>Permanently delete this resource?</p><div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><Btn variant="secondary" onClick={()=>setShowDel(null)}>CANCEL</Btn><Btn variant="danger" onClick={()=>deleteResource(showDel)}>DELETE</Btn></div></Modal>}
  {showFlush&&<Modal title="Flush All Data" onClose={()=>setShowFlush(false)} width={440}><div style={{padding:14,background:C.redBg,borderRadius:4,marginBottom:18}}><p style={{margin:0,fontSize:13,color:C.red,fontWeight:500}}>This deletes everything:</p><ul style={{margin:"8px 0 0 18px",fontSize:13,color:C.textSec,lineHeight:1.8}}><li>All resources</li><li>All logs</li><li>All users (reset)</li></ul></div><div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><Btn variant="secondary" onClick={()=>setShowFlush(false)}>CANCEL</Btn><Btn variant="danger" onClick={flushAll} icon={<Ic d={ic.trash} size={14} sw={2}/>}>FLUSH</Btn></div></Modal>}
  {showAddUser&&<UserModal onClose={()=>setShowAddUser(false)} onSave={addUser}/>}
  {toast&&<Toast {...toast} onClose={()=>setToast(null)}/>}
  </>;
}

function ResModal({t,r:resource,cats,onClose,onSave}){
  const [name,setName]=useState(resource?.name||"");const [cat,setCat]=useState(resource?.category||cats[0]||"");const [type,setType]=useState(resource?.type||"link");const [val,setVal]=useState(resource?.value||"");const [desc,setDesc]=useState(resource?.description||"");
  return <Modal title={t} onClose={onClose}>
    <FF label="Name" ch={<input value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. CRM Login" style={iS}/>}/>
    <FF label="Category" ch={<select value={cat} onChange={e=>setCat(e.target.value)} style={{...iS,cursor:"pointer"}}>{cats.map(c=><option key={c} value={c}>{c}</option>)}</select>}/>
    <FF label="Type" ch={<select value={type} onChange={e=>setType(e.target.value)} style={{...iS,cursor:"pointer"}}><option value="link">Link</option><option value="password">Password</option><option value="file">File</option></select>}/>
    <FF label={type==="password"?"Password":type==="link"?"URL":"Filename"} ch={<input value={val} onChange={e=>setVal(e.target.value)} placeholder={type==="password"?"Enter password":type==="link"?"https://...":"file.pdf"} style={iS}/>}/>
    <FF label="Description" ch={<input value={desc} onChange={e=>setDesc(e.target.value)} placeholder="Brief note" style={iS}/>}/>
    <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:4}}><Btn variant="secondary" onClick={onClose}>CANCEL</Btn><Btn onClick={()=>{if(!name.trim()||!val.trim())return;onSave({...(resource||{}),name:name.trim(),category:cat,type,value:val.trim(),description:desc.trim()})}} disabled={!name.trim()||!val.trim()}>SAVE</Btn></div>
  </Modal>;
}
function UserModal({onClose,onSave}){
  const [name,setName]=useState("");const [email,setEmail]=useState("");const [role,setRole]=useState("Viewer");
  return <Modal title="Add User" onClose={onClose}>
    <FF label="Full Name" ch={<input value={name} onChange={e=>setName(e.target.value)} placeholder="John Doe" style={iS}/>}/>
    <FF label="Email" ch={<input value={email} onChange={e=>setEmail(e.target.value)} placeholder="user@itgeeks.com" style={iS}/>}/>
    <FF label="Role" ch={<select value={role} onChange={e=>setRole(e.target.value)} style={{...iS,cursor:"pointer"}}><option value="Admin">Admin</option><option value="Sales Rep">Sales Rep</option><option value="Viewer">Viewer</option></select>}/>
    <p style={{fontSize:11,color:C.textMuted,marginBottom:12,fontFamily:"'DM Mono',monospace"}}>No password needed — SSO authentication.</p>
    <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:4}}><Btn variant="secondary" onClick={onClose}>CANCEL</Btn><Btn onClick={()=>{if(!name.trim()||!email.trim())return;onSave({name:name.trim(),email:email.trim().toLowerCase(),role,sso:true})}} disabled={!name.trim()||!email.trim()}>ADD</Btn></div>
  </Modal>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
