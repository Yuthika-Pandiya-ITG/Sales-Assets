        <p style={{textAlign:"center",fontSize:13,color:C.textMuted,marginBottom:28,fontFamily:"'DM Mono',monospace"}}>@itgeeks.com access only</p>
        {!IS_DEMO?<div ref={gBtnRef} style={{display:"flex",justifyContent:"center",marginBottom:16}}/>:
        <div>
          <button onClick={()=>onSSOLogin({email:"admin@itgeeks.com",name:"Admin",picture:null,hd:"itgeeks.com"})} style={{width:"100%",padding:"14px 20px",background:"#faf6ef",border:`1.5px solid ${C.border}`,borderRadius:4,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:12,fontSize:14,fontWeight:500,color:C.text,fontFamily:"inherit",boxShadow:C.shadow}}><GoogleIcon/> Sign in with Google</button>
        </div>}
        <div style={{marginTop:24,borderTop:`1px solid ${C.border}`,paddingTop:14,textAlign:"center"}}><p style={{fontSize:11,color:C.textMuted,lineHeight:1.7,fontFamily:"'DM Mono',monospace"}}>New users auto-assigned Sales Rep role.<br/>Contact Admin for role changes.</p></div>
      </div>
    </div>
  </div>;
}

// ══════════════════════════
function App(){
  const [user,setUser]=useState(()=>{try{const s=localStorage.getItem("ig-session");return s?JSON.parse(s):null}catch{return null}});
  const [users,setUsers]=useState(()=>ld(SK.users,DEF_USERS));
  const [res,setRes]=useState(()=>ld(SK.resources,[]));
  const [logs,setLogs]=useState(()=>ld(SK.logs,[]));
  const [cats,setCats]=useState(()=>ld(SK.categories,DEF_CATS));
  const [toast,setToast]=useState(null);
  const [tab,setTab]=useState("home");
  const [search,setSearch]=useState("");
  const [activeCat,setActiveCat]=useState(null); // null=grid view, string=drill into category
  const [showAddRes,setShowAddRes]=useState(false);
  const [showEditRes,setShowEditRes]=useState(null);
  const [showDel,setShowDel]=useState(null);
  const [showAddUser,setShowAddUser]=useState(false);
  const [showFlush,setShowFlush]=useState(false);
  const [logFilter,setLogFilter]=useState("All");
  const [clipCount,setClipCount]=useState(0);
  const [newCat,setNewCat]=useState("");
  const [copyAnimId,setCopyAnimId]=useState(null);
  const clipRef=useRef(null);const impRef=useRef(null);const userImpRef=useRef(null);
  const isAdmin=user?.role==="Admin";

  const persist=(k,d,fn)=>{fn(d);sv(k,d)};
  const addLog=(a,d,cl,cu)=>{const e={id:gid(),user:cu?.email||"system",action:a,detail:d,timestamp:new Date().toISOString()};const u=[e,...cl].slice(0,500);setLogs(u);sv(SK.logs,u);return u};

  const handleSSOLogin=(gu)=>{
    try{
      if(!gu.email||!gu.email.endsWith("@itgeeks.com")){setToast({message:"Access restricted to @itgeeks.com",type:"error"});return}
      const email=gu.email.toLowerCase();
      let eu=users.find(u=>u.email.toLowerCase()===email);
      if(eu){
        setUser(eu);localStorage.setItem("ig-session",JSON.stringify(eu));
        addLog("SSO Login",`${eu.name} (${eu.role})`,logs,eu);
      }else{
        const nu={id:gid(),email,name:gu.name||email.split("@")[0],role:"Sales Rep",sso:true};
        const updated=[...users,nu];
        setUsers(updated);sv(SK.users,updated);
        setUser(nu);localStorage.setItem("ig-session",JSON.stringify(nu));
        addLog("SSO Login (New)",nu.name,logs,nu);
        setToast({message:`Welcome ${nu.name}!`,type:"success"});
      }
    }catch(err){
      console.error("SSO Login error:",err);
      setToast({message:"Login failed. Please try again.",type:"error"});
    }
  };
  const handleLogout=()=>{addLog("Logout",user.name,logs,user);setUser(null);localStorage.removeItem("ig-session");setTab("home")};

  // Mac-style copy with animation
  const copyPwd=(r)=>{
    try{navigator.clipboard.writeText(r.value)}catch{const t=document.createElement("textarea");t.value=r.value;t.style.cssText="position:fixed;opacity:0";document.body.appendChild(t);t.select();document.execCommand("copy");document.body.removeChild(t)}
    setCopyAnimId(r.id);setTimeout(()=>setCopyAnimId(null),600);
    if(clipRef.current)clearInterval(clipRef.current);setClipCount(10);
    clipRef.current=setInterval(()=>{setClipCount(p=>{if(p<=1){clearInterval(clipRef.current);clipRef.current=null;try{navigator.clipboard.writeText("")}catch{}return 0}return p-1})},1000);
    setToast({message:"Password copied",type:"success"});addLog("Copy Password",r.name,logs,user);
  };
  const accessRes=(r)=>{
    if(r.type==="password"){copyPwd(r);return}
    addLog(r.type==="link"?"Access Link":"Download",r.name,logs,user);
    if(r.type==="file"){
      // Try fetch+blob for real download, fallback to window.open
      const fileName=r.name.replace(/[^a-zA-Z0-9._-]/g,"_")||"download";
      fetch(r.value,{mode:"cors"}).then(resp=>{
        if(!resp.ok)throw new Error("fetch failed");
        return resp.blob();
      }).then(blob=>{
        const url=URL.createObjectURL(blob);
        const a=document.createElement("a");a.href=url;a.download=fileName;
        document.body.appendChild(a);a.click();document.body.removeChild(a);
        URL.revokeObjectURL(url);
        setToast({message:`Downloading ${r.name}`,type:"success"});
      }).catch(()=>{
        // Fallback: open in new tab if CORS blocks download
        window.open(r.value,"_blank");
        setToast({message:`Opened ${r.name} — save from browser`,type:"success"});
      });
    }else{
      window.open(r.value,"_blank");
    }
  };

  const addResource=(d)=>{persist(SK.resources,[...res,{...d,id:gid(),addedBy:user.email,addedAt:new Date().toISOString()}],setRes);addLog("Add",d.name,logs,user);setShowAddRes(false);setToast({message:"Added",type:"success"})};
  const editResource=(d)=>{persist(SK.resources,res.map(r=>r.id===d.id?{...r,...d}:r),setRes);addLog("Edit",d.name,logs,user);setShowEditRes(null);setToast({message:"Updated",type:"success"})};
  const deleteResource=(id)=>{const it=res.find(r=>r.id===id);persist(SK.resources,res.filter(r=>r.id!==id),setRes);addLog("Delete",it?.name,logs,user);setShowDel(null);setToast({message:"Deleted",type:"success"})};
  const addUser=(d)=>{if(!d.email.endsWith("@itgeeks.com")){setToast({message:"@itgeeks.com only",type:"error"});return}if(users.find(u=>u.email.toLowerCase()===d.email.toLowerCase())){setToast({message:"Exists",type:"error"});return}persist(SK.users,[...users,{...d,id:gid()}],setUsers);addLog("Add User",d.name,logs,user);setShowAddUser(false);setToast({message:"Added",type:"success"})};
  const deleteUser=(id)=>{if(users.find(u=>u.id===id)?.email===user.email){setToast({message:"Can't remove yourself",type:"error"});return}const usr=users.find(u=>u.id===id);persist(SK.users,users.filter(u=>u.id!==id),setUsers);addLog("Remove",usr?.name,logs,user);setToast({message:"Removed",type:"success"})};
  const handleUserImport=(e)=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=(ev)=>{try{const rows=parseCSV(ev.target.result);const nu=csvToUsers(rows);const ex=new Set(users.map(u=>u.email.toLowerCase()));const valid=nu.filter(u=>u.email.endsWith("@itgeeks.com")&&!ex.has(u.email));if(valid.length)persist(SK.users,[...users,...valid],setUsers);setToast({message:`${valid.length} added, ${nu.length-valid.length} skipped`,type:valid.length?"success":"error"})}catch{setToast({message:"Parse error",type:"error"})}};r.readAsText(f);if(userImpRef.current)userImpRef.current.value=""};
  const expJSON=()=>{const b=new Blob([JSON.stringify({resources:res,categories:cats,exportDate:new Date().toISOString()},null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=`itgeeks_${new Date().toISOString().slice(0,10)}.json`;a.click();addLog("Export","JSON",logs,user);setToast({message:"Exported",type:"success"})};
  const expCSV=()=>{const h=["category","name","type","value","description"];const rows=res.map(r=>h.map(k=>`"${String(r[k]||"").replace(/"/g,'""')}"`).join(","));const b=new Blob([h.join(",")+"\n"+rows.join("\n")],{type:"text/csv"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=`itgeeks_${new Date().toISOString().slice(0,10)}.csv`;a.click();addLog("Export","CSV",logs,user);setToast({message:"Exported",type:"success"})};
  const handleImport=(e)=>{const f=e.target.files[0];if(!f)return;const ext=f.name.split(".").pop().toLowerCase();const r=new FileReader();if(ext==="json"){r.onload=(ev)=>{try{const d=JSON.parse(ev.target.result);if(d.resources){const ids=new Set(res.map(r=>r.id));const nw=d.resources.filter(r=>!ids.has(r.id));persist(SK.resources,[...res,...nw],setRes);if(d.categories)persist(SK.categories,[...new Set([...cats,...d.categories])].sort(),setCats);addLog("Import",`${nw.length}`,logs,user);setToast({message:`${nw.length} imported`,type:"success"})}}catch{setToast({message:"Error",type:"error"})}};r.readAsText(f)}else if(ext==="csv"){r.onload=(ev)=>{try{const nw=csvToRes(parseCSV(ev.target.result),user.email,cats);if(!nw.length){setToast({message:"No rows",type:"error"});return}persist(SK.resources,[...res,...nw],setRes);addLog("Import",`${nw.length}`,logs,user);setToast({message:`${nw.length} imported`,type:"success"})}catch{setToast({message:"Error",type:"error"})}};r.readAsText(f)}else setToast({message:"JSON or CSV only",type:"error"});if(impRef.current)impRef.current.value=""};
  const flushAll=()=>{persist(SK.resources,[],setRes);persist(SK.logs,[],setLogs);persist(SK.users,DEF_USERS,setUsers);persist(SK.categories,DEF_CATS,setCats);setShowFlush(false);setToast({message:"Flushed",type:"success"})};
  const addCategory=()=>{const n=newCat.trim();if(!n||cats.includes(n))return;persist(SK.categories,[...cats,n].sort(),setCats);setNewCat("");setToast({message:`"${n}" added`,type:"success"})};
  const removeCategory=(c)=>{persist(SK.categories,cats.filter(x=>x!==c),setCats);setToast({message:"Removed",type:"success"})};

  const catItems=activeCat?res.filter(r=>r.category===activeCat&&(!search||r.name.toLowerCase().includes(search.toLowerCase()))):[];
  const fLogs=(logFilter==="All"?logs:logs.filter(l=>l.action===logFilter)).slice(0,100);

  if(!user)return <><LoginScreen onSSOLogin={handleSSOLogin} setToast={setToast}/>{toast&&<Toast {...toast} onClose={()=>setToast(null)}/>}</>;

  const nav=[{id:"home",l:"Home",i:ic.home},{id:"resources",l:"Files",i:ic.cat},...(isAdmin?[{id:"users",l:"Users",i:ic.users},{id:"logs",l:"Logs",i:ic.log},{id:"ie",l:"Export",i:ic.dl},{id:"settings",l:"Config",i:ic.gear}]:[])];

  return <>
  <div style={{display:"flex",minHeight:"100vh",background:C.bg,color:C.text}}>
    <aside style={{width:78,background:C.sidebar,borderRight:`1px solid ${C.border}`,display:"flex",flexDirection:"column",alignItems:"center",paddingTop:18,flexShrink:0}}>
      <div style={{padding:"5px 12px",border:`1.5px solid ${C.border}`,borderRadius:20,marginBottom:24}}><span style={{fontFamily:"'Libre Baskerville',serif",fontSize:12,fontWeight:700}}>ITG</span></div>
      <nav style={{flex:1,display:"flex",flexDirection:"column",gap:2,width:"100%"}}>{nav.map(n=><div key={n.id} className="nv" onClick={()=>{setTab(n.id);if(n.id==="resources")setActiveCat(null)}} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"9px 4px",cursor:"pointer",borderRadius:4,margin:"0 6px",color:tab===n.id?C.accentDark:C.textMuted,background:tab===n.id?C.accentLight:"transparent"}}><Ic d={n.i} size={18}/><span style={{fontSize:9,fontWeight:500,fontFamily:"'DM Mono',monospace",textTransform:"uppercase"}}>{n.l}</span></div>)}</nav>
      <div style={{paddingBottom:14}}><div className="nv" onClick={handleLogout} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"9px 4px",cursor:"pointer",borderRadius:4,margin:"0 6px",color:C.red}}><Ic d={ic.out} size={18}/><span style={{fontSize:9,fontFamily:"'DM Mono',monospace"}}>EXIT</span></div></div>
    </aside>

    <main style={{flex:1,overflow:"auto",padding:"20px 28px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
        <span className="stamp">Confidential</span>
        <div style={{display:"flex",alignItems:"center",gap:8,padding:"6px 12px",background:C.surface,borderRadius:4,border:`1px solid ${C.borderLight}`}}>
          <div style={{width:28,height:28,borderRadius:4,background:C.accentLight,color:C.accentDark,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,fontFamily:"'Libre Baskerville',serif"}}>{user.name.charAt(0)}</div>
          <div><div style={{fontSize:12,fontWeight:600}}>{user.name}</div><div style={{fontSize:10,color:C.textMuted,fontFamily:"'DM Mono',monospace"}}>{user.email}</div></div>
          <RoleBadge role={user.role}/>
        </div>
      </div>

      {/* HOME */}
      {tab==="home"&&<div style={{animation:"fadeUp .25s ease"}}>
        <h2 style={{fontFamily:"'Libre Baskerville',serif",fontSize:22,fontWeight:700,margin:"0 0 4px"}}>Welcome, {user.name.split(" ")[0]}</h2>
        <p style={{color:C.textMuted,fontSize:12,fontFamily:"'DM Mono',monospace",margin:"0 0 20px"}}>DASHBOARD OVERVIEW</p>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(160px, 1fr))",gap:12,marginBottom:24}}>
          {[{l:"Total",v:res.length,c:C.blue},{l:"Passwords",v:res.filter(r=>r.type==="password").length,c:C.red},{l:"Links",v:res.filter(r=>r.type==="link").length,c:C.green},{l:"Files",v:res.filter(r=>r.type==="file").length,c:C.amber}].map(s=><div key={s.l} className="card" style={{padding:"16px 18px"}}><div style={{fontSize:10,color:C.textMuted,fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:".08em",marginBottom:6}}>{s.l}</div><div style={{fontSize:28,fontWeight:700,color:s.c,fontFamily:"'Libre Baskerville',serif"}}>{s.v}</div></div>)}
        </div>
        <div className="card" style={{padding:"16px 18px"}}><h3 style={{fontSize:13,fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:".05em",margin:"0 0 12px"}}>Recent Files</h3>
          {res.length===0?<p style={{color:C.textMuted,fontSize:13,padding:"20px 0",textAlign:"center"}}>No resources available yet.{isAdmin?" Add resources from the Files section.":" Your Admin will add resources soon."}</p>:res.slice(-5).reverse().map(r=><div key={r.id} className="rh" onClick={()=>accessRes(r)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"9px 10px",borderRadius:4,cursor:"pointer",marginBottom:2}}><div style={{display:"flex",alignItems:"center",gap:10}}><TypeIcon type={r.type}/><div><div style={{fontSize:13,fontWeight:500}}>{r.name}</div><div style={{fontSize:11,color:C.textMuted,fontFamily:"'DM Mono',monospace"}}>{r.category}</div></div></div></div>)}
        </div>
      </div>}

      {/* RESOURCES — FOLDER GRID VIEW */}
      {tab==="resources"&&!activeCat&&<div style={{animation:"fadeUp .25s ease"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20,flexWrap:"wrap",gap:10}}>
          <div><h2 style={{fontFamily:"'Libre Baskerville',serif",fontSize:22,fontWeight:700,margin:0}}>Folders</h2><p style={{color:C.textMuted,fontSize:12,fontFamily:"'DM Mono',monospace",margin:"3px 0 0"}}>{cats.length} CATEGORIES</p></div>
          {isAdmin&&<Btn icon={<Ic d={ic.plus} size={14} sw={2.2}/>} onClick={()=>setShowAddRes(true)}>ADD</Btn>}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(220px, 1fr))",gap:16}}>
          {cats.map(cat=>{
            const items=res.filter(r=>r.category===cat);
            const color=catColors[cat]||C.accent;
            const bg=catBgs[cat]||C.accentLight;
            const iconPath=catIcons[cat]||ic.file;
            return <div key={cat} className="card folder-card" onClick={()=>setActiveCat(cat)} style={{padding:"20px 22px",cursor:"pointer"}}>
              <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:16}}>
                <div style={{width:44,height:44,borderRadius:10,background:bg,color,display:"flex",alignItems:"center",justifyContent:"center"}}><Ic d={iconPath} size={22} sw={1.5}/></div>
                <span style={{fontSize:10,fontFamily:"'DM Mono',monospace",color:C.textMuted,padding:"2px 8px",background:C.surfaceWarm,borderRadius:10}}>{items.length}</span>
              </div>
              <h3 style={{fontSize:15,fontWeight:600,marginBottom:4,color:C.text}}>{cat}</h3>
              <p style={{fontSize:12,color:C.textMuted,fontFamily:"'DM Mono',monospace"}}>{items.length} item{items.length!==1?"s":""}</p>
            </div>;
          })}
        </div>
      </div>}

      {/* RESOURCES — DRILLED INTO CATEGORY */}
      {tab==="resources"&&activeCat&&<div style={{animation:"fadeUp .25s ease"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16,flexWrap:"wrap",gap:10}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <button onClick={()=>setActiveCat(null)} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:4,padding:"6px 8px",cursor:"pointer",display:"flex",color:C.textSec}}><Ic d={ic.back} size={16} sw={2}/></button>
            <div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{width:32,height:32,borderRadius:8,background:catBgs[activeCat]||C.accentLight,color:catColors[activeCat]||C.accent,display:"flex",alignItems:"center",justifyContent:"center"}}><Ic d={catIcons[activeCat]||ic.file} size={16} sw={1.5}/></div>
                <h2 style={{fontFamily:"'Libre Baskerville',serif",fontSize:20,fontWeight:700,margin:0}}>{activeCat}</h2>
              </div>
              <p style={{color:C.textMuted,fontSize:12,fontFamily:"'DM Mono',monospace",margin:"3px 0 0"}}>{catItems.length} ITEMS</p>
            </div>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <div style={{position:"relative"}}><span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",color:C.textMuted,display:"flex"}}><Ic d={ic.search} size={14} sw={2}/></span><input placeholder="Search..." value={search} onChange={e=>setSearch(e.target.value)} style={{...iS,paddingLeft:32,width:180}}/></div>
            {isAdmin&&<Btn icon={<Ic d={ic.plus} size={14} sw={2.2}/>} onClick={()=>setShowAddRes(true)}>ADD</Btn>}
          </div>
        </div>
        <div className="card" style={{padding:0}}>
          {catItems.length===0?<div style={{padding:40,textAlign:"center",color:C.textMuted,fontFamily:"'DM Mono',monospace"}}>NO ITEMS</div>:
          catItems.map((r,i)=><div key={r.id} className="rh" style={{display:"flex",alignItems:"center",padding:"13px 18px",borderBottom:i<catItems.length-1?`1px solid ${C.borderLight}`:"none",gap:14}}>
            <TypeIcon type={r.type}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:14,fontWeight:600,marginBottom:1}}>{r.name}</div>
              <div style={{fontSize:12,color:C.textMuted,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.description||"—"}</div>
              {r.type==="password"&&<div className={copyAnimId===r.id?"dot-anim":""} style={{fontSize:13,color:C.textMuted,marginTop:2,letterSpacing:3,userSelect:"none",fontFamily:"'DM Mono',monospace",display:"flex",alignItems:"center",gap:8}}>
                {copyAnimId===r.id?<><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={C.green} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12" style={{strokeDasharray:20,animation:"checkDraw .3s ease forwards"}}/></svg><span style={{color:C.green,fontSize:11,fontWeight:600}}>COPIED</span></>:"●●●●●●●●●●"}
              </div>}
            </div>
            <div style={{display:"flex",gap:4,alignItems:"center",flexShrink:0}}>
              {r.type==="password"&&<Btn variant="ghost" size="sm" icon={<Ic d={copyAnimId===r.id?ic.check:ic.copy} size={12} sw={2}/>} onClick={()=>copyPwd(r)} className={copyAnimId===r.id?"copy-anim":""}>{copyAnimId===r.id?"DONE":"COPY"}</Btn>}
              {r.type!=="password"&&<Btn variant="ghost" size="sm" icon={<Ic d={ic.ext} size={12} sw={2}/>} onClick={()=>accessRes(r)}>OPEN</Btn>}
              {r.type!=="password"&&<Btn variant="ghost" size="sm" icon={<Ic d={ic.dl} size={12} sw={2}/>} onClick={()=>accessRes(r)}>DL</Btn>}
              {isAdmin&&<><Btn variant="ghost" size="sm" icon={<Ic d={ic.edit} size={12} sw={2}/>} onClick={()=>setShowEditRes(r)} style={{color:C.textMuted}}/><Btn variant="ghost" size="sm" icon={<Ic d={ic.trash} size={12} sw={2}/>} onClick={()=>setShowDel(r.id)} style={{color:C.red}}/></>}
            </div>
          </div>)}
        </div>
      </div>}

      {/* USERS */}
      {tab==="users"&&isAdmin&&<div style={{animation:"fadeUp .25s ease"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18,flexWrap:"wrap",gap:10}}><h2 style={{fontFamily:"'Libre Baskerville',serif",fontSize:22,fontWeight:700}}>Personnel</h2><div style={{display:"flex",gap:8}}><input ref={userImpRef} type="file" accept=".csv" onChange={handleUserImport} style={{display:"none"}}/><Btn variant="secondary" icon={<Ic d={ic.ul} size={14} sw={2}/>} onClick={()=>userImpRef.current?.click()}>BULK CSV</Btn><Btn icon={<Ic d={ic.plus} size={14} sw={2.2}/>} onClick={()=>setShowAddUser(true)}>ADD</Btn></div></div>
        <div className="card" style={{overflow:"visible"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}><thead><tr style={{borderBottom:`2px solid ${C.border}`}}>{["Name","Email","Role",""].map(h=><th key={h} style={{textAlign:"left",padding:"10px 16px",fontSize:10,fontWeight:500,color:C.textMuted,fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:".08em"}}>{h}</th>)}</tr></thead><tbody>{users.map(u=><tr key={u.id} className="rh" style={{borderBottom:`1px solid ${C.borderLight}`}}><td style={{padding:"10px 16px",fontWeight:500}}>{u.name}</td><td style={{padding:"10px 16px",color:C.textSec,fontFamily:"'DM Mono',monospace",fontSize:12}}>{u.email}</td><td style={{padding:"10px 16px"}}><RoleBadge role={u.role}/></td><td style={{padding:"10px 16px"}}>{u.email!==user.email?<Btn variant="ghost" size="sm" onClick={()=>deleteUser(u.id)} style={{color:C.red}}>REMOVE</Btn>:<span style={{fontSize:10,color:C.textMuted,fontFamily:"'DM Mono',monospace"}}>YOU</span>}</td></tr>)}</tbody></table></div>
        <div className="card" style={{marginTop:14,padding:16}}><p style={{fontSize:12,color:C.textMuted,fontFamily:"'DM Mono',monospace"}}>CSV: name, email, role — no password (SSO). Duplicates skipped.</p></div>
      </div>}

      {/* LOGS */}
      {tab==="logs"&&isAdmin&&<div style={{animation:"fadeUp .25s ease"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18,flexWrap:"wrap",gap:10}}><h2 style={{fontFamily:"'Libre Baskerville',serif",fontSize:22,fontWeight:700}}>Activity Log</h2><div style={{display:"flex",gap:8}}><select value={logFilter} onChange={e=>setLogFilter(e.target.value)} style={{...iS,width:"auto"}}><option value="All">All</option>{[...new Set(logs.map(l=>l.action))].map(a=><option key={a} value={a}>{a}</option>)}</select><Btn variant="ghost" size="sm" onClick={()=>{setLogs([]);sv(SK.logs,[])}}>CLEAR</Btn></div></div>
        <div className="card" style={{overflow:"visible"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:12,tableLayout:"fixed"}}><colgroup><col style={{width:"22%"}}/><col style={{width:"24%"}}/><col style={{width:"16%"}}/><col style={{width:"38%"}}/></colgroup><thead><tr style={{borderBottom:`2px solid ${C.border}`}}>{["When","Who","Action","Detail"].map(h=><th key={h} style={{textAlign:"left",padding:"10px 16px",fontSize:10,color:C.textMuted,fontFamily:"'DM Mono',monospace",textTransform:"uppercase",letterSpacing:".08em"}}>{h}</th>)}</tr></thead><tbody>{fLogs.length===0?<tr><td colSpan={4} style={{padding:30,textAlign:"center",color:C.textMuted,fontFamily:"'DM Mono',monospace"}}>EMPTY</td></tr>:fLogs.map(l=>{const ac=l.action.includes("Delete")||l.action.includes("Remove")?C.red:l.action.includes("Login")||l.action.includes("Logout")?C.amber:l.action.includes("Copy")?C.purple:C.blue;return <tr key={l.id} className="rh" style={{borderBottom:`1px solid ${C.borderLight}`}}><td style={{padding:"9px 16px",color:C.textMuted,fontFamily:"'DM Mono',monospace",fontSize:11}}>{fdt(l.timestamp)}</td><td style={{padding:"9px 16px",color:C.textSec,fontFamily:"'DM Mono',monospace",fontSize:11,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{l.user}</td><td style={{padding:"9px 16px"}}><span style={{padding:"2px 8px",borderRadius:2,fontSize:10,fontWeight:600,background:`${ac}18`,color:ac,fontFamily:"'DM Mono',monospace"}}>{l.action}</span></td><td style={{padding:"9px 16px",color:C.textSec,fontSize:11,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{l.detail}</td></tr>})}</tbody></table></div>
      </div>}

      {/* IMPORT/EXPORT */}
      {tab==="ie"&&isAdmin&&<div style={{animation:"fadeUp .25s ease"}}><h2 style={{fontFamily:"'Libre Baskerville',serif",fontSize:22,fontWeight:700,margin:"0 0 20px"}}>Import & Export</h2>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(220px, 1fr))",gap:12,marginBottom:20}}>{[{t:"JSON",d:"Full backup",c:C.blue,bg:C.blueBg,fn:expJSON,v:"blue"},{t:"CSV",d:"For Sheets",c:C.green,bg:C.greenBg,fn:expCSV,v:"success"},{t:"Import",d:"JSON or CSV",c:C.amber,bg:C.amberBg,fn:()=>impRef.current?.click(),v:"secondary"}].map(x=><div key={x.t} className="card" style={{padding:18}}><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}><div style={{width:32,height:32,borderRadius:6,background:x.bg,color:x.c,display:"flex",alignItems:"center",justifyContent:"center"}}><Ic d={ic.dl}/></div><h3 style={{fontSize:13,fontWeight:600}}>{x.t}</h3></div><p style={{fontSize:12,color:C.textMuted,marginBottom:10}}>{x.d}</p><Btn variant={x.v} onClick={x.fn}>{x.t==="Import"?"UPLOAD":"DOWNLOAD"}</Btn></div>)}</div>
        <input ref={impRef} type="file" accept=".json,.csv" onChange={handleImport} style={{display:"none"}}/>
        <div className="card" style={{padding:18,borderColor:`${C.red}40`}}><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}><div style={{width:32,height:32,borderRadius:6,background:C.redBg,color:C.red,display:"flex",alignItems:"center",justifyContent:"center"}}><Ic d={ic.trash} size={14} sw={2}/></div><h3 style={{fontSize:13,fontWeight:600,color:C.red}}>Flush All</h3></div><p style={{fontSize:12,color:C.textSec,marginBottom:10}}>Delete everything permanently.</p><Btn variant="danger" onClick={()=>setShowFlush(true)}>FLUSH</Btn></div>
      </div>}

      {/* SETTINGS */}
      {tab==="settings"&&isAdmin&&<div style={{animation:"fadeUp .25s ease"}}><h2 style={{fontFamily:"'Libre Baskerville',serif",fontSize:22,fontWeight:700,margin:"0 0 20px"}}>Configuration</h2>
        <div className="card" style={{padding:20,marginBottom:16}}><h3 style={{fontSize:14,fontWeight:600,margin:"0 0 12px"}}>Categories</h3><div style={{display:"flex",gap:8,marginBottom:16}}><input value={newCat} onChange={e=>setNewCat(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addCategory()} placeholder="New category..." style={{...iS,flex:1}}/><Btn onClick={addCategory} disabled={!newCat.trim()}>ADD</Btn></div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>{cats.map(c=>{const n=res.filter(r=>r.category===c).length;return <div key={c} style={{display:"flex",alignItems:"center",gap:4,padding:"5px 12px",background:C.surfaceWarm,borderRadius:4,border:`1px solid ${C.border}`,fontSize:12,fontWeight:500}}><div style={{width:16,height:16,borderRadius:4,background:catBgs[c]||C.accentLight,color:catColors[c]||C.accent,display:"flex",alignItems:"center",justifyContent:"center"}}><Ic d={catIcons[c]||ic.file} size={10} sw={1.5}/></div>{c}<span style={{fontSize:10,color:C.textMuted}}>({n})</span>{n===0&&<button onClick={()=>removeCategory(c)} style={{background:"none",border:"none",color:C.red,cursor:"pointer",display:"flex"}}><Ic d={ic.x} size={12} sw={2}/></button>}</div>})}</div>
        </div>
        <div className="card" style={{padding:20,marginBottom:16}}><h3 style={{fontSize:14,fontWeight:600,margin:"0 0 10px"}}>Google SSO</h3><div style={{padding:14,background:C.surfaceWarm,borderRadius:4,fontSize:12,color:C.textSec,lineHeight:1.8,fontFamily:"'DM Mono',monospace"}}>1. console.cloud.google.com<br/>2. APIs → Credentials → OAuth 2.0<br/>3. Type: Web app<br/>4. Origins: your Vercel URL<br/>5. Replace YOUR_CLIENT_ID in index.html<br/>6. Restrict to @itgeeks.com</div><div style={{marginTop:10,padding:"6px 12px",background:IS_DEMO?C.amberBg:C.greenBg,borderRadius:2,fontSize:11,fontWeight:500,color:IS_DEMO?C.amber:C.green,fontFamily:"'DM Mono',monospace",display:"inline-block"}}>{IS_DEMO?"SETUP NEEDED":"SSO ACTIVE"}</div></div>
        <div className="card" style={{padding:20}}><h3 style={{fontSize:14,fontWeight:600,margin:"0 0 8px"}}>Storage</h3><p style={{fontSize:12,color:C.textMuted}}>localStorage. Export → Sheets for backup.</p></div>
      </div>}
    </main>
  </div>

  {showAddRes&&<ResModal t="Add Resource" cats={cats} defCat={activeCat} onClose={()=>setShowAddRes(false)} onSave={addResource}/>}
  {showEditRes&&<ResModal t="Edit" cats={cats} r={showEditRes} onClose={()=>setShowEditRes(null)} onSave={editResource}/>}
  {showDel&&<Modal title="Delete" onClose={()=>setShowDel(null)} width={400}><p style={{fontSize:13,color:C.textSec,marginBottom:18}}>Permanently delete?</p><div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><Btn variant="secondary" onClick={()=>setShowDel(null)}>CANCEL</Btn><Btn variant="danger" onClick={()=>deleteResource(showDel)}>DELETE</Btn></div></Modal>}
  {showFlush&&<Modal title="Flush All" onClose={()=>setShowFlush(false)} width={440}><div style={{padding:14,background:C.redBg,borderRadius:4,marginBottom:18}}><p style={{margin:0,fontSize:13,color:C.red,fontWeight:500}}>Deletes everything:</p><ul style={{margin:"8px 0 0 18px",fontSize:13,color:C.textSec,lineHeight:1.8}}><li>All resources</li><li>All logs</li><li>Reset users</li></ul></div><div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><Btn variant="secondary" onClick={()=>setShowFlush(false)}>CANCEL</Btn><Btn variant="danger" onClick={flushAll}>FLUSH</Btn></div></Modal>}
  {showAddUser&&<UserModal onClose={()=>setShowAddUser(false)} onSave={addUser}/>}
  {toast&&<Toast {...toast} onClose={()=>setToast(null)}/>}
  </>;
}

function ResModal({t,r:resource,cats,defCat,onClose,onSave}){
  const [name,setName]=useState(resource?.name||"");const [cat,setCat]=useState(resource?.category||defCat||cats[0]||"");const [type,setType]=useState(resource?.type||"link");const [val,setVal]=useState(resource?.value||"");const [desc,setDesc]=useState(resource?.description||"");
  return <Modal title={t} onClose={onClose}>
    <FF label="Name" ch={<input value={name} onChange={e=>setName(e.target.value)} placeholder="Resource name" style={iS}/>}/>
    <FF label="Category" ch={<select value={cat} onChange={e=>setCat(e.target.value)} style={{...iS,cursor:"pointer"}}>{cats.map(c=><option key={c} value={c}>{c}</option>)}</select>}/>
    <FF label="Type" ch={<select value={type} onChange={e=>setType(e.target.value)} style={{...iS,cursor:"pointer"}}><option value="link">Link</option><option value="password">Password</option><option value="file">File</option></select>}/>
    <FF label={type==="password"?"Password":type==="link"?"URL":"Filename"} ch={<input value={val} onChange={e=>setVal(e.target.value)} style={iS}/>}/>
    <FF label="Description" ch={<input value={desc} onChange={e=>setDesc(e.target.value)} placeholder="Brief note" style={iS}/>}/>
    <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><Btn variant="secondary" onClick={onClose}>CANCEL</Btn><Btn onClick={()=>{if(!name.trim()||!val.trim())return;onSave({...(resource||{}),name:name.trim(),category:cat,type,value:val.trim(),description:desc.trim()})}} disabled={!name.trim()||!val.trim()}>SAVE</Btn></div>
  </Modal>;
}
function UserModal({onClose,onSave}){
  const [name,setName]=useState("");const [email,setEmail]=useState("");const [role,setRole]=useState("Sales Rep");
  return <Modal title="Add User" onClose={onClose}>
    <FF label="Name" ch={<input value={name} onChange={e=>setName(e.target.value)} placeholder="Full name" style={iS}/>}/>
    <FF label="Email" ch={<input value={email} onChange={e=>setEmail(e.target.value)} placeholder="user@itgeeks.com" style={iS}/>}/>
    <FF label="Role" ch={<select value={role} onChange={e=>setRole(e.target.value)} style={{...iS,cursor:"pointer"}}><option value="Admin">Admin</option><option value="Sales Rep">Sales Rep</option></select>}/>
    <p style={{fontSize:11,color:C.textMuted,fontFamily:"'DM Mono',monospace",marginBottom:12}}>SSO — no password needed.</p>
    <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><Btn variant="secondary" onClick={onClose}>CANCEL</Btn><Btn onClick={()=>{if(!name.trim()||!email.trim())return;onSave({name:name.trim(),email:email.trim().toLowerCase(),role,sso:true})}} disabled={!name.trim()||!email.trim()}>ADD</Btn></div>
  </Modal>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
